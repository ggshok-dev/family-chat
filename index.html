<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FChat — Семейный чат</title>
    <!-- Исправлено: правильное подключение библиотеки эмодзи -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.20.2/index.js"></script>
    <style>
        :root {
            --bg: #0d1b2a;
            --header: #1b4332;
            --chat-bg: #0b141a;
            --incoming: #202c33;
            --outgoing: #005c4b;
            --text: #e9edef;
            --accent: #00a884;
            --input-panel: #202c33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100dvh;
            overflow: hidden;
        }

        header { 
            background: var(--header); 
            padding: 12px; 
            text-align: center; 
            font-size: 1.2rem; 
            font-weight: 700; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header-emoji {
            font-size: 1.5rem;
        }

        .chat-tabs {
            display: flex;
            background: #1b263b;
            padding: 4px;
            gap: 4px;
        }

        .chat-tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #8696a0;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .chat-tabs button.active {
            background: #40916c;
            color: white;
        }

        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 4px;
            background: var(--chat-bg);
        }

        .message { 
            position: relative;
            max-width: 80%; 
            padding: 8px 12px; 
            font-size: 0.95rem; 
            line-height: 1.4;
            margin-bottom: 2px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.2);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .incoming { 
            background: var(--incoming); 
            align-self: flex-start; 
            border-radius: 0 12px 12px 12px;
        }

        .outgoing { 
            background: var(--outgoing); 
            align-self: flex-end; 
            border-radius: 12px 0 12px 12px;
        }

        .welcome {
            align-self: center;
            background: rgba(64, 145, 108, 0.2);
            color: #94a3b8;
            border-radius: 10px;
            font-size: 0.85rem;
            text-align: center;
            margin: 10px 0;
            max-width: 90%;
            padding: 10px;
        }

        .user-name { 
            font-size: 0.75rem; 
            font-weight: 700; 
            color: #52b788; 
            margin-bottom: 2px;
        }
        .outgoing .user-name { display: none; }

        .message-time { 
            font-size: 0.65rem; 
            text-align: right; 
            opacity: 0.5;
            margin-top: 4px;
        }

        .text {
            word-wrap: break-word;
        }

        .input-area { 
            background: var(--input-panel); 
            padding: 10px 12px; 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-top-row {
            display: flex;
            gap: 8px;
        }

        .input-top-row input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: #2a3942;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: background 0.3s;
        }

        .input-top-row input:focus {
            background: #3a4952;
        }

        .input-main-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        textarea {
            flex: 1;
            min-height: 40px;
            max-height: 120px;
            background: #2a3942;
            border: none;
            border-radius: 20px;
            padding: 10px 15px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: background 0.3s;
        }

        textarea:focus {
            background: #3a4952;
        }

        .icon-btn {
            background: none;
            border: none;
            padding: 8px;
            font-size: 1.5rem;
            color: #8696a0;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .icon-btn:hover {
            transform: scale(1.1);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        #send-btn { 
            color: var(--accent); 
            font-weight: bold;
        }

        /* Исправлено: стили для emoji-picker */
        emoji-picker {
            position: fixed;
            bottom: 80px;
            left: 10px;
            right: 10px;
            max-width: 400px;
            z-index: 100;
            display: none;
            height: 350px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            border-radius: 12px;
        }

        @media (min-width: 768px) {
            .message {
                max-width: 60%;
            }
            
            emoji-picker {
                right: auto;
                width: 350px;
            }
        }
    </style>
</head>
<body>
    <header>
        <span class="header-emoji">👨‍👩‍👧‍👦</span>
        FChat
    </header>
    
    <div class="chat-tabs">
        <button id="btn-general" class="active">💬 Общий</button>
        <button id="btn-private">🔒 Личный</button>
    </div>

    <div id="chat-window"></div>

    <!-- Исправлено: emoji-picker теперь должен корректно отображаться -->
    <emoji-picker class="dark" id="emoji-picker"></emoji-picker>

    <div class="input-area">
        <div class="input-top-row">
            <input type="text" id="username" placeholder="👤 Ваше имя">
            <input type="text" id="recipient" placeholder="👥 Кому..." style="display: none;">
        </div>
        <div class="input-main-row">
            <button class="icon-btn" id="emoji-btn" title="Эмодзи">😊</button>
            <textarea id="message-input" rows="1" placeholder="✍️ Сообщение..."></textarea>
            <button class="icon-btn" id="send-btn" title="Отправить">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, off } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGqZPNEL2eihYYxr0ZJoE-Tedg1cO5cVo",
            authDomain: "fchat-d6879.firebaseapp.com",
            databaseURL: "https://fchat-d6879-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fchat-d6879",
            storageBucket: "fchat-d6879.firebasestorage.app",
            messagingSenderId: "1049514912319",
            appId: "1:1049514912319:web:2ec9ca065eca5ac5da668a",
            measurementId: "G-11PJ481DDP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const chatWindow = document.getElementById('chat-window');
        const usernameInput = document.getElementById('username');
        const recipientInput = document.getElementById('recipient');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const emojiBtn = document.getElementById('emoji-btn');
        const picker = document.getElementById('emoji-picker');
        const btnGeneral = document.getElementById('btn-general');
        const btnPrivate = document.getElementById('btn-private');

        let currentChatType = 'general';
        let currentChatRef = null;

        // Генерация ID для личного чата
        function getChatId(u1, u2) {
            const users = [u1.trim().toLowerCase(), u2.trim().toLowerCase()].sort();
            return `${users[0]}_${users[1]}`;
        }

        function formatTime(ts) {
            return new Date(ts).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addMessage(snapshot) {
            const msg = snapshot.val();
            if (!msg?.text) return;

            const currentUser = usernameInput.value.trim();
            const isMy = msg.name === currentUser;
            
            const html = `
                <div class="message ${isMy ? 'outgoing' : 'incoming'}">
                    <div class="user-name">${msg.name}</div>
                    <div class="text">${msg.text}</div>
                    <div class="message-time">${formatTime(msg.time)}</div>
                </div>`;
            chatWindow.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        function loadChat() {
            // Отключаем предыдущий слушатель
            if (currentChatRef) {
                off(currentChatRef);
            }
            chatWindow.innerHTML = '';

            let path = 'messages';
            let welcomeText = '👋 Добро пожаловать в общий чат!';

            if (currentChatType === 'private') {
                const me = usernameInput.value.trim();
                const target = recipientInput.value.trim();
                if (!me || !target) {
                    chatWindow.innerHTML = '<div class="message welcome">Введите оба имени для личного чата</div>';
                    return;
                }
                path = `privateChats/${getChatId(me, target)}/messages`;
                welcomeText = `🔒 Личный чат с ${target}`;
            }

            chatWindow.innerHTML = `<div class="message welcome">${welcomeText}</div>`;
            currentChatRef = ref(db, path);
            onChildAdded(currentChatRef, addMessage);
        }

        function sendMessage() {
            const name = usernameInput.value.trim() || 'Гость';
            const text = messageInput.value.trim();
            if (!text) return;

            let path = 'messages';
            if (currentChatType === 'private') {
                const target = recipientInput.value.trim();
                if (!target) {
                    alert('Укажите получателя');
                    return;
                }
                path = `privateChats/${getChatId(name, target)}/messages`;
            }

            push(ref(db, path), { 
                name, 
                text, 
                time: Date.now() 
            });
            
            messageInput.value = '';
            messageInput.style.height = '40px';
            messageInput.focus();
        }

        // Обработка эмодзи
        emojiBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const isVisible = picker.style.display === 'block';
            picker.style.display = isVisible ? 'none' : 'block';
        });

        // Исправлено: слушаем правильное событие для emoji-picker-element
        picker.addEventListener('emoji-click', (event) => {
            const emoji = event.detail.unicode;
            if (emoji) {
                messageInput.value += emoji;
                messageInput.focus();
                // Обновляем высоту textarea
                messageInput.dispatchEvent(new Event('input'));
            }
        });

        // Закрытие пикера при клике вне его
        document.addEventListener('click', (e) => {
            if (!picker.contains(e.target) && e.target !== emojiBtn) {
                picker.style.display = 'none';
            }
        });

        picker.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // Авторесайз textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Отправка по Enter
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Кнопки переключения чатов
        btnGeneral.addEventListener('click', () => {
            currentChatType = 'general';
            btnGeneral.classList.add('active');
            btnPrivate.classList.remove('active');
            recipientInput.style.display = 'none';
            loadChat();
        });

        btnPrivate.addEventListener('click', () => {
            currentChatType = 'private';
            btnPrivate.classList.add('active');
            btnGeneral.classList.remove('active');
            recipientInput.style.display = 'block';
            recipientInput.focus();
            loadChat();
        });

        // Отправка по клику
        sendBtn.addEventListener('click', sendMessage);

        // Обновление чата при смене получателя
        recipientInput.addEventListener('change', loadChat);
        
        // Автообновление при вводе имени
        usernameInput.addEventListener('change', () => {
            if (currentChatType === 'private') {
                loadChat();
            }
        });

        // Сохранение имени в localStorage
        const savedName = localStorage.getItem('fchat_username');
        if (savedName) {
            usernameInput.value = savedName;
        }
        
        usernameInput.addEventListener('input', () => {
            localStorage.setItem('fchat_username', usernameInput.value);
        });

        // Запуск
        window.addEventListener('load', () => {
            if (!savedName) {
                usernameInput.focus();
            }
            loadChat();
            console.log("✅ FChat успешно запущен!");
        });
    </script>
</body>
</html>
