<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FChat — Семейный мессенджер</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.20.2/index.js"></script>
  <style>
    :root {
      --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --header: linear-gradient(135deg, #667eea, #764ba2);
      --chat-bg: #f8f9fa;
      --bubble-sent: #667eea;
      --bubble-received: #ffffff;
      --text-sent: white;
      --text-received: #333;
    }
    body.dark { --bg: #1a1a2e; --chat-bg: #16213e; --bubble-received: #1e2a44; --text-received: #e0e0e0; }
    body.green { --bg: linear-gradient(135deg, #2d6a4f, #40916c); --bubble-sent: #2d6a4f; }
    body.purple { --bg: linear-gradient(135deg, #5a189a, #9d4edd); --bubble-sent: #5a189a; }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }
    .messenger {
      width: 100%;
      max-width: 480px;
      height: 94vh;
      background: var(--chat-bg);
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: var(--header);
      color: white;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.35rem; }
    .user-btn {
      padding: 6px 12px;
      background: rgba(255,255,255,0.25);
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .user-btn.active { background: white; color: #333; font-weight: bold; }

    .chat-tabs { display: flex; background: rgba(0,0,0,0.08); padding: 6px; gap: 6px; }
    .chat-tab {
      flex: 1; padding: 10px; border: none; border-radius: 12px;
      background: transparent; font-weight: 600; cursor: pointer;
    }
    .chat-tab.active { background: white; color: #333; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--chat-bg);
    }
    .message {
      max-width: 80%;
      animation: fadeIn 0.3s;
    }
    .message.sent { align-self: flex-end; }
    .message.received { align-self: flex-start; }
    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.97rem;
      line-height: 1.45;
    }
    .sent .bubble { background: var(--bubble-sent); color: var(--text-sent); border-bottom-right-radius: 4px; }
    .received .bubble { background: var(--bubble-received); color: var(--text-received); border-bottom-left-radius: 4px; }

    .meta { font-size: 0.72rem; color: #888; margin-top: 3px; text-align: right; }

    .input-panel {
      background: white;
      padding: 10px 12px;
      border-top: 1px solid #eee;
    }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .text-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 24px;
      padding: 12px 16px;
      font-size: 1rem;
      resize: none;
      max-height: 120px;
    }
    .icon-btn {
      width: 44px; height: 44px;
      border: none;
      background: #f0f0f0;
      border-radius: 50%;
      font-size: 1.5rem;
      cursor: pointer;
    }
    .send-btn {
      width: 44px; height: 44px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 1.4rem;
      cursor: pointer;
    }
    emoji-picker { height: 320px; width: 100%; }
  </style>
</head>
<body class="light">
<div class="messenger">
  <div class="header">
    <h1>👨‍👩‍👧‍👦 FChat</h1>
    <div id="userSelector"></div>
  </div>

  <div class="chat-tabs">
    <button class="chat-tab active" data-type="general">Общий чат</button>
    <button class="chat-tab" data-type="private">Приватный</button>
  </div>

  <div id="privateSelector" class="private-selector" style="display:none; padding:8px 12px; background:#f8f9fa; border-bottom:1px solid #eee;">
    <strong>С кем переписываемся:</strong>
    <select id="privateRecipient" style="margin-left:10px; padding:6px;"></select>
  </div>

  <div class="chat-window" id="chatWindow"></div>

  <div class="input-panel">
    <div id="emojiBar" style="display:none; margin-bottom:8px;">
      <emoji-picker id="emojiPicker"></emoji-picker>
    </div>
    <div class="input-row">
      <button class="icon-btn" id="emojiBtn">😊</button>
      <button class="icon-btn" id="attachBtn">📷</button>
      <textarea class="text-input" id="messageInput" placeholder="Напишите сообщение..."></textarea>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">

<script type="module">
  // ================== Firebase ==================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAGqZPNEL2eihYYxr0ZJoE-Tedg1cO5cVo",
    authDomain: "fchat-d6879.firebaseapp.com",
    databaseURL: "https://fchat-d6879-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "fchat-d6879",
    storageBucket: "fchat-d6879.firebasestorage.app",
    messagingSenderId: "1049514912319",
    appId: "1:1049514912319:web:2ec9ca065eca5ac5da668a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ================== Данные семьи ==================
  const MEMBERS = [
    { id: "dad",    name: "Папа",     emoji: "👨" },
    { id: "mom",    name: "Мама",     emoji: "👩" },
    { id: "sergey", name: "Сергей",   emoji: "👦" },
    { id: "sveta",  name: "Света",    emoji: "👧" },
    { id: "katya",  name: "Катя",     emoji: "👧" }
  ];

  // ================== Переменные ==================
  let currentUser = localStorage.getItem("fc_user") || "dad";
  let activeChatType = "general";           // general | private
  let privateWith = null;                   // с кем ведём приватный чат

  // ================== DOM ==================
  const chatWindow = document.getElementById("chatWindow");
  const messageInput = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  const emojiBtn = document.getElementById("emojiBtn");
  const attachBtn = document.getElementById("attachBtn");
  const fileInput = document.getElementById("fileInput");
  const emojiPicker = document.getElementById("emojiPicker");
  const emojiBar = document.getElementById("emojiBar");
  const userSelector = document.getElementById("userSelector");
  const privateSelector = document.getElementById("privateSelector");
  const privateRecipient = document.getElementById("privateRecipient");

  // ================== IndexedDB для медиа ==================
  let dbLocal = null;
  const dbRequest = indexedDB.open("FChatMedia", 1);
  dbRequest.onupgradeneeded = e => {
    dbLocal = e.target.result;
    dbLocal.createObjectStore("media", { keyPath: "id" });
  };
  dbRequest.onsuccess = e => dbLocal = e.target.result;

  async function saveMedia(id, blob) {
    return new Promise((resolve) => {
      const tx = dbLocal.transaction("media", "readwrite");
      tx.objectStore("media").put({ id, blob, time: Date.now() });
      tx.oncomplete = () => resolve(true);
    });
  }

  async function getMedia(id) {
    return new Promise((resolve) => {
      const tx = dbLocal.transaction("media", "readonly");
      const req = tx.objectStore("media").get(id);
      req.onsuccess = () => resolve(req.result ? req.result.blob : null);
    });
  }

  // ================== Основные функции ==================
  function getChatRef() {
    if (activeChatType === "general") {
      return ref(db, "messages");
    } else {
      const ids = [currentUser, privateWith].sort();
      return ref(db, `private/${ids[0]}_${ids[1]}`);
    }
  }

  function renderMessage(msg) {
    const isSent = msg.from === currentUser;
    const member = MEMBERS.find(m => m.id === msg.from) || { name: msg.from, emoji: "👤" };

    const div = document.createElement("div");
    div.className = `message ${isSent ? "sent" : "received"}`;
    div.dataset.key = msg.key;

    let content = msg.text || "";
    if (msg.mediaId) {
      content = `<div class="media-preview" data-id="${msg.mediaId}">📎 Медиа (локально)</div>`;
    }

    div.innerHTML = `
      ${!isSent ? `<div style="font-size:0.8rem;opacity:0.8;">${member.emoji} ${member.name}</div>` : ''}
      <div class="bubble">${content}</div>
      <div class="meta">${new Date(msg.timestamp).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</div>
    `;

    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    const messageData = {
      from: currentUser,
      text: text,
      timestamp: Date.now()
    };

    const chatRef = getChatRef();
    await push(chatRef, messageData);
    messageInput.value = "";
  }

  // ================== Инициализация пользователей ==================
  function initUserSelector() {
    userSelector.innerHTML = MEMBERS.map(m => `
      <button class="user-btn ${m.id === currentUser ? 'active' : ''}" data-id="${m.id}">
        ${m.emoji} ${m.name}
      </button>
    `).join('');

    userSelector.querySelectorAll('.user-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const newUser = btn.dataset.id;
        if (newUser === currentUser) return;

        const pin = prompt(`Введите ПИН для ${MEMBERS.find(m => m.id === newUser).name}:`);
        if (pin === "0000" || pin === "1234") {   // простой пин для теста, потом можно усложнить
          currentUser = newUser;
          localStorage.setItem("fc_user", currentUser);
          initUserSelector();
          chatWindow.innerHTML = "";
          subscribeToMessages();
        } else {
          alert("Неверный ПИН");
        }
      });
    });
  }

  function subscribeToMessages() {
    const chatRef = getChatRef();
    onChildAdded(chatRef, (snapshot) => {
      const msg = snapshot.val();
      msg.key = snapshot.key;
      renderMessage(msg);
    });
  }

  // ================== Запуск ==================
  initUserSelector();
  subscribeToMessages();

  // Эмодзи
  emojiBtn.addEventListener("click", () => {
    emojiBar.style.display = emojiBar.style.display === "block" ? "none" : "block";
  });

  emojiPicker.addEventListener("emoji-click", e => {
    messageInput.value += e.detail.unicode;
    messageInput.focus();
  });

  // Отправка
  sendBtn.addEventListener("click", sendMessage);
  messageInput.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
  });

  // Фото (локально)
  attachBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const mediaId = "img_" + Date.now();
    await saveMedia(mediaId, file);
    alert("Фото сохранено локально (пока только у вас)");
    // Можно добавить renderMessage с превью
  });

  console.log("FChat упрощённая версия запущена");
</script>
</body>
</html>
