<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FChat</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial,sans-serif; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:center; }
        #secretScreen { background:white; padding:30px; border-radius:20px; text-align:center; max-width:350px; width:90%; }
        #secretScreen h2 { margin-bottom:15px; }
        #secretInput { width:100%; padding:12px; border:2px solid #ddd; border-radius:10px; font-size:1.1rem; text-align:center; margin:10px 0; }
        #secretBtn { width:100%; padding:12px; background:#667eea; color:white; border:none; border-radius:10px; font-size:1rem; cursor:pointer; }
        #chatScreen { display:none; width:100%; max-width:450px; height:95vh; background:#f5f5f5; border-radius:20px; overflow:hidden; }
        .header { background:#667eea; color:white; padding:15px; display:flex; gap:10px; align-items:center; }
        #users { display:flex; gap:10px; padding:10px; background:white; overflow-x:auto; }
        .user { padding:8px 14px; background:#f0f0f0; border-radius:20px; cursor:pointer; white-space:nowrap; }
        .user.active { background:#667eea; color:white; }
        #chat { flex:1; overflow-y:auto; padding:15px; }
        .msg { max-width:80%; margin:5px 0; padding:10px 14px; border-radius:15px; }
        .msg.sent { background:#667eea; color:white; margin-left:auto; }
        .msg.received { background:white; }
        #inputArea { padding:10px; background:white; display:flex; gap:8px; }
        #msgInput { flex:1; padding:10px; border:1px solid #ddd; border-radius:20px; }
        #sendBtn { padding:10px 20px; background:#667eea; color:white; border:none; border-radius:20px; cursor:pointer; }
        .error { color:red; display:none; margin-top:10px; }
    </style>
</head>
<body>
    <div id="secretScreen">
        <h2>👨‍👩‍👧‍👦 Семейный чат</h2>
        <p>Введите секретный код</p>
        <input type="password" id="secretInput" placeholder="••••" maxlength="10">
        <button id="secretBtn">Войти</button>
        <p class="error" id="errorMsg">Неверный код</p>
        <p style="margin-top:10px; font-size:0.8rem; color:#999;">Код: family2024</p>
    </div>

    <div id="chatScreen">
        <div class="header">
            <span>👨‍👩‍👧‍👦</span>
            <span style="font-weight:bold;">FChat</span>
            <span id="currentUserName" style="margin-left:auto;"></span>
        </div>
        <div id="users"></div>
        <div id="chat"><p style="text-align:center;color:#999;">Выберите пользователя</p></div>
        <div id="inputArea">
            <input type="text" id="msgInput" placeholder="Сообщение...">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
