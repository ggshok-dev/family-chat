<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FChat — Семейный мессенджер</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }
    
    .app {
      width: 100%;
      max-width: 450px;
      height: 95vh;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header-logo {
      font-size: 28px;
    }
    
    .header-title {
      font-size: 1.3rem;
      font-weight: 700;
      flex: 1;
    }
    
    .theme-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 20px;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .theme-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.1);
    }
    
    /* User avatars */
    .users-avatars {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 15px;
      background: #f8f9fa;
      border-bottom: 1px solid #eee;
      overflow-x: auto;
    }
    
    .user-avatar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    
    .user-avatar:hover {
      transform: translateY(-3px);
    }
    
    .avatar-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 3px solid transparent;
      transition: all 0.2s;
      background: #e0e0e0;
    }
    
    .user-avatar.active .avatar-circle {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
      transform: scale(1.1);
    }
    
    .avatar-name {
      font-size: 0.75rem;
      font-weight: 600;
      color: #666;
    }
    
    .user-avatar.active .avatar-name {
      color: #667eea;
    }
    
    .online-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4CAF50;
      position: absolute;
      top: 0;
      right: 0;
      border: 2px solid white;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      padding: 8px 15px;
      gap: 8px;
      background: white;
      border-bottom: 1px solid #eee;
    }
    
    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: #f0f0f0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .tab.active {
      background: #667eea;
      color: white;
    }
    
    /* Settings */
    .settings-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 15px;
      background: #fff;
      border-bottom: 1px solid #eee;
      font-size: 0.85rem;
    }
    
    .settings-bar select {
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 0.85rem;
    }
    
    .clear-btn {
      padding: 4px 12px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-left: auto;
    }
    
    /* Private selector */
    .private-selector {
      display: none;
      padding: 8px 15px;
      background: white;
      border-bottom: 1px solid #eee;
    }
    
    .private-selector select {
      width: 100%;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    
    /* Chat */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .empty-chat {
      text-align: center;
      color: #999;
      margin-top: 40px;
    }
    
    .empty-icon {
      font-size: 50px;
      margin-bottom: 10px;
    }
    
    /* Messages */
    .message {
      max-width: 80%;
      animation: slideIn 0.3s;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.sent {
      align-self: flex-end;
    }
    
    .message.received {
      align-self: flex-start;
    }
    
    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.4;
      word-wrap: break-word;
      position: relative;
    }
    
    .sent .bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .received .bubble {
      background: white;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    
    .msg-sender {
      font-size: 0.75rem;
      font-weight: 600;
      color: #764ba2;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .msg-sender-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      background: #e0e0e0;
    }
    
    .msg-time {
      font-size: 0.7rem;
      color: #999;
      margin-top: 4px;
      text-align: right;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .sent .msg-time {
      color: rgba(255,255,255,0.8);
    }
    
    .msg-menu-btn {
      cursor: pointer;
      opacity: 0.5;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    .msg-menu-btn:hover {
      opacity: 1;
      background: rgba(0,0,0,0.1);
    }
    
    /* Media */
    .media-img {
      max-width: 200px;
      max-height: 200px;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px 0;
      display: block;
    }
    
    .media-audio {
      margin: 5px 0;
      max-width: 200px;
    }
    
    /* Emoji picker */
    .emoji-picker-wrapper {
      display: none;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      background: white;
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
    }
    
    .emoji-picker-wrapper.show {
      display: block;
    }
    
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
    }
    
    .emoji-item {
      font-size: 1.5rem;
      padding: 5px;
      cursor: pointer;
      text-align: center;
      border-radius: 8px;
      transition: all 0.2s;
      border: none;
      background: none;
    }
    
    .emoji-item:hover {
      background: #f0f0f0;
      transform: scale(1.2);
    }
    
    /* Input */
    .input-panel {
      padding: 12px 15px;
      background: white;
      border-top: 1px solid #eee;
    }
    
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    
    .icon-btn {
      width: 38px;
      height: 38px;
      border: none;
      background: #f0f0f0;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .icon-btn:hover {
      background: #e0e0e0;
      transform: scale(1.05);
    }
    
    .icon-btn.recording {
      background: #ff4444;
      color: white;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(255,68,68,0); }
    }
    
    .msg-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 10px 15px;
      font-size: 0.95rem;
      resize: none;
      max-height: 100px;
      font-family: inherit;
      outline: none;
    }
    
    .msg-input:focus {
      border-color: #667eea;
    }
    
    .send-btn {
      width: 38px;
      height: 38px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .send-btn:hover {
      background: #764ba2;
      transform: scale(1.05);
    }
    
    /* Context menu */
    .context-menu {
      position: fixed;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      z-index: 1000;
      overflow: hidden;
      animation: fadeIn 0.2s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .context-menu button {
      display: block;
      width: 100%;
      padding: 10px 15px;
      border: none;
      background: none;
      text-align: left;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    
    .context-menu button:hover {
      background: #f5f5f5;
    }
    
    .danger-btn {
      color: #ff4444;
    }
    
    /* Dark theme */
    body.dark-theme .app {
      background: #1a1a2e;
    }
    
    body.dark-theme .chat-window {
      background: #16213e;
    }
    
    body.dark-theme .received .bubble {
      background: #1a1a2e;
      border-color: #2a2a4a;
      color: #eee;
    }
    
    body.dark-theme .msg-input {
      background: #1a1a2e;
      color: white;
      border-color: #2a2a4a;
    }
    
    body.dark-theme .input-panel,
    body.dark-theme .tabs,
    body.dark-theme .users-avatars,
    body.dark-theme .settings-bar,
    body.dark-theme .private-selector {
      background: #16213e;
      border-color: #2a2a4a;
    }
    
    body.dark-theme .tab {
      background: #1a1a2e;
      color: #eee;
    }
    
    body.dark-theme .icon-btn {
      background: #1a1a2e;
      color: #eee;
    }
    
    body.dark-theme .avatar-name {
      color: #aaa;
    }
    
    body.dark-theme .emoji-picker-wrapper {
      background: #1a1a2e;
      border-color: #2a2a4a;
    }
    
    body.dark-theme .emoji-item:hover {
      background: #2a2a4a;
    }
    
    body.dark-theme .context-menu {
      background: #1a1a2e;
      color: #eee;
    }
    
    body.dark-theme .context-menu button:hover {
      background: #2a2a4a;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <span class="header-logo">👨‍👩‍👧‍👦</span>
      <span class="header-title">FChat</span>
      <button class="theme-btn" id="themeBtn" title="Переключить тему">🌙</button>
    </div>

    <!-- Users with avatars -->
    <div class="users-avatars" id="usersAvatars"></div>

    <!-- Settings -->
    <div class="settings-bar">
      <span>🗑️ Автоудаление:</span>
      <select id="autoDeleteSelect">
        <option value="0">Выключено</option>
        <option value="1">1 час</option>
        <option value="6">6 часов</option>
        <option value="24" selected>24 часа</option>
        <option value="168">7 дней</option>
      </select>
      <button class="clear-btn" id="clearChatBtn">🗑️ Очистить</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="general">💬 Общий чат</button>
      <button class="tab" data-tab="private">🔒 Личный чат</button>
    </div>

    <!-- Private selector -->
    <div class="private-selector" id="privateSelector">
      <select id="privateRecipient">
        <option value="">Выберите собеседника...</option>
      </select>
    </div>

    <!-- Chat window -->
    <div class="chat-window" id="chatWindow">
      <div class="empty-chat">
        <div class="empty-icon">💬</div>
        <p>Нет сообщений</p>
      </div>
    </div>

    <!-- Input panel -->
    <div class="input-panel">
      <!-- Emoji picker -->
      <div class="emoji-picker-wrapper" id="emojiPicker">
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
      
      <div class="input-row">
        <button class="icon-btn" id="emojiBtn">😊</button>
        <button class="icon-btn" id="micBtn">🎤</button>
        <button class="icon-btn" id="attachBtn">📎</button>
        <textarea class="msg-input" id="msgInput" rows="1" placeholder="Сообщение..."></textarea>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <script>
    // ============ FIREBASE ============
    const firebaseConfig = {
      apiKey: "AIzaSyAGqZPNEL2eihYYxr0ZJoE-Tedg1cO5cVo",
      authDomain: "fchat-d6879.firebaseapp.com",
      databaseURL: "https://fchat-d6879-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "fchat-d6879",
      storageBucket: "fchat-d6879.firebasestorage.app",
      messagingSenderId: "1049514912319",
      appId: "1:1049514912319:web:2ec9ca065eca5ac5da668a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============ EMOJI LIST ============
    const EMOJIS = [
      '😀','😂','🤣','😃','😄','😅','😆','😉','😊','😋','😎','😍','🥰','😘','😗','😙',
      '😚','🙂','🤗','🤩','🤔','🤨','😐','😑','😶','🙄','😏','😣','😥','😮','🤐','😯',
      '😪','😫','😴','😌','😛','😜','😝','🤤','😒','😓','😔','😕','🙃','🤑','😲','☹️',
      '🙁','😖','😞','😟','😤','😢','😭','😦','😧','😨','😩','🤯','😬','😰','😱','🥵',
      '🥶','😳','🤪','😵','😡','😠','🤬','😷','🤒','🤕','🤢','🤮','😇','🤠','🤡','🥳',
      '🥴','🥺','🤥','🤫','🤭','🧐','🤓','😈','👿','👹','👺','💀','👻','👽','🤖','💩',
      '❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💔','❣️','💕','💞','💓','💗','💖',
      '👍','👎','👏','🙌','🤝','💪','✌️','🤞','👌','🤏','✋','👋','🤚','🖐️','✍️','🙏'
    ];

    // ============ FAMILY ============
    const FAMILY = {
      dad: { id: 'dad', name: 'Папа', emoji: '👨', color: '#4A90E2' },
      mom: { id: 'mom', name: 'Мама', emoji: '👩', color: '#E91E63' },
      sergey: { id: 'sergey', name: 'Сергей', emoji: '👦', color: '#4CAF50' },
      sveta: { id: 'sveta', name: 'Света', emoji: '👧', color: '#FF9800' },
      katya: { id: 'katya', name: 'Катя', emoji: '👧', color: '#9C27B0' }
    };

    // ============ STATE ============
    let currentUser = localStorage.getItem('fc_user') || 'dad';
    let activeTab = 'general';
    let privateWith = null;
    let autoDeleteHours = 24;
    let messageListener = null;
    let mediaRecorder = null;
    let audioChunks = [];

    // ============ INIT ============
    function init() {
      renderEmojiPicker();
      renderUserAvatars();
      setupTabs();
      setupListeners();
      loadSettings();
      subscribeToMessages();
      startAutoDelete();
    }

    // ============ EMOJI PICKER ============
    function renderEmojiPicker() {
      const grid = document.getElementById('emojiGrid');
      grid.innerHTML = EMOJIS.map(emoji => 
        `<button class="emoji-item" data-emoji="${emoji}">${emoji}</button>`
      ).join('');

      // Add click handlers
      grid.querySelectorAll('.emoji-item').forEach(btn => {
        btn.addEventListener('click', () => {
          const textarea = document.getElementById('msgInput');
          textarea.value += btn.dataset.emoji;
          textarea.focus();
        });
      });
    }

    // ============ USER AVATARS ============
    function renderUserAvatars() {
      const container = document.getElementById('usersAvatars');
      container.innerHTML = Object.values(FAMILY).map(member => `
        <div class="user-avatar ${member.id === currentUser ? 'active' : ''}" 
             data-user="${member.id}" 
             title="${member.name}">
          <div class="avatar-circle" style="background: ${member.color}20; position: relative;">
            ${member.emoji}
            ${member.id === currentUser ? '<div class="online-dot"></div>' : ''}
          </div>
          <span class="avatar-name">${member.name}</span>
        </div>
      `).join('');

      // Click handlers
      container.querySelectorAll('.user-avatar').forEach(avatar => {
        avatar.addEventListener('click', () => switchUser(avatar.dataset.user));
      });
    }

    function switchUser(userId) {
      if (userId === currentUser) return;
      
      // PIN protection
      const savedPin = localStorage.getItem(`fc_pin_${userId}`);
      if (savedPin) {
        const pin = prompt(`Введите ПИН для ${FAMILY[userId].name}:`);
        if (pin !== savedPin) {
          alert('Неверный ПИН');
          return;
        }
      } else {
        const pin = prompt(`Придумайте 4-значный ПИН для ${FAMILY[userId].name}:`);
        if (!pin || pin.length !== 4) return;
        localStorage.setItem(`fc_pin_${userId}`, pin);
      }

      currentUser = userId;
      localStorage.setItem('fc_user', userId);
      renderUserAvatars();
      updatePrivateList();
      resetChat();
    }

    // ============ TABS ============
    function setupTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          activeTab = tab.dataset.tab;
          
          const privateSel = document.getElementById('privateSelector');
          if (activeTab === 'private') {
            privateSel.style.display = 'block';
            updatePrivateList();
          } else {
            privateSel.style.display = 'none';
          }
          
          resetChat();
        });
      });
    }

    function updatePrivateList() {
      const select = document.getElementById('privateRecipient');
      const others = Object.values(FAMILY).filter(m => m.id !== currentUser);
      
      select.innerHTML = '<option value="">Выберите...</option>' +
        others.map(m => `<option value="${m.id}" ${m.id === privateWith ? 'selected' : ''}>${m.emoji} ${m.name}</option>`).join('');
    }

    document.getElementById('privateRecipient').addEventListener('change', (e) => {
      privateWith = e.target.value;
      if (privateWith) resetChat();
    });

    // ============ MESSAGES ============
    function getChatPath() {
      if (activeTab === 'private' && privateWith) {
        const users = [currentUser, privateWith].sort();
        return `private/${users[0]}_${users[1]}`;
      }
      return 'general';
    }

    function subscribeToMessages() {
      if (messageListener) {
        db.ref(getChatPath()).off('child_added', messageListener);
      }

      const chatRef = db.ref(getChatPath());
      
      document.getElementById('chatWindow').innerHTML = `
        <div class="empty-chat">
          <div class="empty-icon">💬</div>
          <p>Нет сообщений</p>
        </div>
      `;

      messageListener = chatRef.on('child_added', (snap) => {
        const msg = snap.val();
        msg.id = snap.key;
        displayMessage(msg);
      });

      chatRef.on('child_changed', (snap) => {
        const msg = snap.val();
        msg.id = snap.key;
        updateMessage(msg);
      });

      chatRef.on('child_removed', (snap) => {
        const el = document.querySelector(`[data-id="${snap.key}"]`);
        if (el) el.remove();
      });
    }

    function resetChat() {
      subscribeToMessages();
    }

    function displayMessage(msg) {
      const chatWindow = document.getElementById('chatWindow');
      const emptyEl = chatWindow.querySelector('.empty-chat');
      if (emptyEl) emptyEl.remove();

      const isSent = msg.from === currentUser;
      const sender = FAMILY[msg.from] || { name: 'Неизвестный', emoji: '👤', color: '#999' };
      
      const div = document.createElement('div');
      div.className = `message ${isSent ? 'sent' : 'received'}`;
      div.dataset.id = msg.id;
      
      let content = '';
      
      if (msg.type === 'image') {
        content = `<img src="${msg.data}" class="media-img" alt="Фото" loading="lazy" 
                   onclick="this.requestFullscreen?.()">`;
      } else if (msg.type === 'voice') {
        content = `<audio controls class="media-audio" src="${msg.data}"></audio>`;
      } else {
        content = msg.text || '';
      }

      const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { 
        hour: '2-digit', minute: '2-digit' 
      });

      div.innerHTML = `
        ${!isSent ? `
          <div class="msg-sender">
            <span class="msg-sender-avatar">${sender.emoji}</span>
            ${sender.name}
          </div>
        ` : ''}
        <div class="bubble">
          ${content}
          <div class="msg-time">
            <span>${time}</span>
            ${isSent ? '<span class="msg-menu-btn" title="Действия">⋮</span>' : ''}
          </div>
        </div>
      `;

      if (isSent) {
        const menuBtn = div.querySelector('.msg-menu-btn');
        menuBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          showContextMenu(e, msg);
        });
      }

      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function updateMessage(msg) {
      const old = document.querySelector(`[data-id="${msg.id}"]`);
      if (old) {
        old.remove();
        displayMessage(msg);
      }
    }

    function showContextMenu(event, msg) {
      const existing = document.querySelector('.context-menu');
      if (existing) existing.remove();

      const menu = document.createElement('div');
      menu.className = 'context-menu';
      menu.innerHTML = `
        <button>✏️ Редактировать</button>
        <button class="danger-btn">🗑️ Удалить</button>
      `;
      
      menu.style.left = Math.min(event.clientX, window.innerWidth - 150) + 'px';
      menu.style.top = event.clientY + 'px';
      
      document.body.appendChild(menu);

      menu.querySelectorAll('button')[0].addEventListener('click', () => {
        menu.remove();
        const newText = prompt('Новый текст:', msg.text || '');
        if (newText && newText !== msg.text) {
          db.ref(`${getChatPath()}/${msg.id}`).update({ text: newText, edited: true });
        }
      });

      menu.querySelectorAll('button')[1].addEventListener('click', () => {
        menu.remove();
        if (confirm('Удалить сообщение?')) {
          db.ref(`${getChatPath()}/${msg.id}`).remove();
        }
      });

      setTimeout(() => {
        const handler = () => {
          menu.remove();
          document.removeEventListener('click', handler);
        };
        document.addEventListener('click', handler);
      }, 0);
    }

    // ============ SEND ============
    async function sendMessage(text) {
      if (!text.trim()) return;
      
      const msg = {
        from: currentUser,
        text: text.trim(),
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        type: 'text'
      };
      
      if (autoDeleteHours > 0) {
        msg.deleteAt = Date.now() + (autoDeleteHours * 3600000);
      }
      
      await db.ref(getChatPath()).push(msg);
      document.getElementById('msgInput').value = '';
    }

    async function sendMedia(type, dataUrl) {
      // Compress image if needed
      let finalData = dataUrl;
      if (type === 'image' && dataUrl.length > 500000) { // > 500KB
        finalData = await compressImage(dataUrl);
      }
      
      const msg = {
        from: currentUser,
        type: type,
        data: finalData,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        text: type === 'image' ? '📷 Фото' : '🎤 Голосовое сообщение'
      };
      
      if (autoDeleteHours > 0) {
        msg.deleteAt = Date.now() + (autoDeleteHours * 3600000);
      }
      
      await db.ref(getChatPath()).push(msg);
    }

    // Compress image before sending
    function compressImage(dataUrl, maxWidth = 800) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          
          if (width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = dataUrl;
      });
    }

    // ============ LISTENERS ============
    function setupListeners() {
      // Send
      document.getElementById('sendBtn').addEventListener('click', () => {
        sendMessage(document.getElementById('msgInput').value);
      });

      document.getElementById('msgInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(e.target.value);
        }
      });

      // Emoji toggle
      document.getElementById('emojiBtn').addEventListener('click', () => {
        const picker = document.getElementById('emojiPicker');
        picker.classList.toggle('show');
      });

      // Close emoji picker when clicking outside
      document.addEventListener('click', (e) => {
        const picker = document.getElementById('emojiPicker');
        const emojiBtn = document.getElementById('emojiBtn');
        if (!picker.contains(e.target) && e.target !== emojiBtn) {
          picker.classList.remove('show');
        }
      });

      // File upload
      document.getElementById('attachBtn').addEventListener('click', () => {
        document.getElementById('fileInput').click();
      });

      document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            sendMedia('image', ev.target.result);
          };
          reader.readAsDataURL(file);
        }
      });

      // Voice recording
      document.getElementById('micBtn').addEventListener('click', async () => {
        const micBtn = document.getElementById('micBtn');
        
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
          micBtn.classList.remove('recording');
          micBtn.textContent = '🎤';
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = (e) => {
            audioChunks.push(e.data);
          };

          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = (ev) => {
              sendMedia('voice', ev.target.result);
            };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(t => t.stop());
          };

          mediaRecorder.start();
          micBtn.classList.add('recording');
          micBtn.textContent = '⏹️';

          // Auto-stop after 10 seconds
          setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
              mediaRecorder.stop();
              micBtn.classList.remove('recording');
              micBtn.textContent = '🎤';
            }
          }, 10000);
        } catch (err) {
          alert('Микрофон недоступен: ' + err.message);
        }
      });

      // Settings
      document.getElementById('autoDeleteSelect').addEventListener('change', (e) => {
        autoDeleteHours = parseInt(e.target.value);
        localStorage.setItem('fc_autoDelete', autoDeleteHours);
      });

      document.getElementById('clearChatBtn').addEventListener('click', () => {
        if (confirm('Удалить все сообщения в этом чате?')) {
          db.ref(getChatPath()).remove();
        }
      });

      // Theme
      document.getElementById('themeBtn').addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        const isDark = document.body.classList.contains('dark-theme');
        document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('fc_theme', isDark ? 'dark' : 'light');
      });
    }

    function loadSettings() {
      autoDeleteHours = parseInt(localStorage.getItem('fc_autoDelete') || '24');
      document.getElementById('autoDeleteSelect').value = autoDeleteHours;

      const theme = localStorage.getItem('fc_theme') || 'light';
      if (theme === 'dark') {
        document.body.classList.add('dark-theme');
        document.getElementById('themeBtn').textContent = '☀️';
      }
    }

    // ============ AUTO DELETE ============
    function startAutoDelete() {
      setInterval(async () => {
        if (autoDeleteHours === 0) return;
        
        const chatRef = db.ref(getChatPath());
        const snap = await chatRef.once('value');
        const msgs = snap.val();
        
        if (!msgs) return;
        
        const now = Date.now();
        const updates = {};
        
        for (const [id, msg] of Object.entries(msgs)) {
          if (msg.deleteAt && msg.deleteAt <= now) {
            updates[id] = null;
          }
        }
        
        if (Object.keys(updates).length > 0) {
          await chatRef.update(updates);
        }
      }, 30000);
    }

    // Start
    init();
    console.log('✅ FChat запущен! Эмодзи: ' + EMOJIS.length + ' шт.');
  </script>
