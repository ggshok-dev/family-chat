<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FChat — Семейный чат</title>
    <!-- Библиотека эмодзи -->
    <script type="module" src="https://jsdelivr.net"></script>
    <style>
        :root {
            --bg: #0d1b2a;
            --header: #1b4332;
            --chat-bg: #0b141a;
            --incoming: #202c33;
            --outgoing: #005c4b;
            --text: #e9edef;
            --accent: #00a884;
            --input-panel: #202c33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100dvh;
            overflow: hidden;
        }

        header { 
            background: var(--header); 
            padding: 12px; 
            text-align: center; 
            font-size: 1.2rem; 
            font-weight: 700; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .chat-tabs {
            display: flex;
            background: #1b263b;
            padding: 4px;
            gap: 4px;
        }

        .chat-tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #8696a0;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .chat-tabs button.active {
            background: #40916c;
            color: white;
        }

        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 4px;
            background: var(--chat-bg);
        }

        /* Стиль облачков сообщений */
        .message { 
            position: relative;
            max-width: 80%; 
            padding: 8px 12px; 
            font-size: 0.95rem; 
            line-height: 1.4;
            margin-bottom: 2px;
            box-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }

        .incoming { 
            background: var(--incoming); 
            align-self: flex-start; 
            border-radius: 0 12px 12px 12px;
        }

        .outgoing { 
            background: var(--outgoing); 
            align-self: flex-end; 
            border-radius: 12px 0 12px 12px;
        }

        .welcome {
            align-self: center;
            background: rgba(64, 145, 108, 0.2);
            color: #94a3b8;
            border-radius: 10px;
            font-size: 0.85rem;
            text-align: center;
            margin: 10px 0;
            max-width: 90%;
        }

        .user-name { 
            font-size: 0.75rem; 
            font-weight: 700; 
            color: #52b788; 
            margin-bottom: 2px;
        }
        .outgoing .user-name { display: none; }

        .message-time { 
            font-size: 0.65rem; 
            text-align: right; 
            opacity: 0.5;
            margin-top: 4px;
        }

        /* Панель ввода */
        .input-area { 
            background: var(--input-panel); 
            padding: 10px 12px; 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-top-row {
            display: flex;
            gap: 8px;
        }

        .input-top-row input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: #2a3942;
            color: white;
            font-size: 0.9rem;
        }

        .input-main-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        textarea {
            flex: 1;
            min-height: 40px;
            max-height: 120px;
            background: #2a3942;
            border: none;
            border-radius: 20px;
            padding: 10px 15px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
        }

        .icon-btn {
            background: none;
            border: none;
            padding: 8px;
            font-size: 1.5rem;
            color: #8696a0;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        #send-btn { color: var(--accent); }

        emoji-picker {
            position: fixed;
            bottom: 80px;
            left: 10px;
            right: 10px;
            z-index: 100;
            display: none;
            height: 350px;
        }
    </style>
</head>
<body>
    <header>FChat</header>
    
    <div class="chat-tabs">
        <button id="btn-general" class="active">Общий</button>
        <button id="btn-private">Личный</button>
    </div>

    <div id="chat-window"></div>

    <emoji-picker class="dark"></emoji-picker>

    <div class="input-area">
        <div class="input-top-row">
            <input type="text" id="username" placeholder="Ваше имя">
            <input type="text" id="recipient" placeholder="Кому..." style="display: none;">
        </div>
        <div class="input-main-row">
            <button class="icon-btn" id="emoji-btn">😊</button>
            <textarea id="message-input" rows="1" placeholder="Сообщение"></textarea>
            <button class="icon-btn" id="send-btn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGqZPNEL2eihYYxr0ZJoE-Tedg1cO5cVo",
            authDomain: "fchat-d6879.firebaseapp.com",
            databaseURL: "https://fchat-d6879-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fchat-d6879",
            storageBucket: "fchat-d6879.firebasestorage.app",
            messagingSenderId: "1049514912319",
            appId: "1:1049514912319:web:2ec9ca065eca5ac5da668a",
            measurementId: "G-11PJ481DDP"
        };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const chatWindow = document.getElementById('chat-window');
    const usernameInput = document.getElementById('username');
    const recipientInput = document.getElementById('recipient');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const emojiBtn = document.getElementById('emoji-btn');
    const picker = document.querySelector('emoji-picker');
    const btnGeneral = document.getElementById('btn-general');
    const btnPrivate = document.getElementById('btn-private');

    let currentChatType = 'general';
    let currentChatRef = null;

    // Генерируем уникальный ID для пары пользователей
    function getChatId(u1, u2) {
        const users = [u1.trim().toLowerCase(), u2.trim().toLowerCase()].sort();
        return `${users[0]}_${users[1]}`; // Исправлено: берем элементы массива
    }

    function formatTime(ts) {
        return new Date(ts).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function scrollToBottom() {
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addMessage(snapshot) {
        const msg = snapshot.val();
        if (!msg?.text) return;

        const isMy = msg.name === usernameInput.value.trim();
        const html = `
            <div class="message ${isMy ? 'outgoing' : 'incoming'}">
                <div class="user-name">${msg.name}</div>
                <div class="text">${msg.text}</div>
                <div class="message-time">${formatTime(msg.time)}</div>
            </div>`;
        chatWindow.insertAdjacentHTML('beforeend', html);
        scrollToBottom();
    }

    function loadChat() {
        if (currentChatRef) off(currentChatRef); // Отключаем старый чат перед загрузкой нового
        chatWindow.innerHTML = '';

        let path = 'messages';
        let welcomeText = '👋 Добро пожаловать в общий чат!';

        if (currentChatType === 'private') {
            const me = usernameInput.value.trim();
            const target = recipientInput.value.trim();
            if (!me || !target) {
                chatWindow.innerHTML = '<div class="message welcome">Введите своё имя и имя получателя</div>';
                return;
            }
            path = `privateChats/${getChatId(me, target)}/messages`;
            welcomeText = `🔒 Личный чат: ${me} и ${target}`;
        }

        chatWindow.innerHTML = `<div class="message welcome">${welcomeText}</div>`;
        currentChatRef = ref(db, path);
        onChildAdded(currentChatRef, addMessage);
    }

    function sendMessage() {
        const name = usernameInput.value.trim() || 'Гость';
        const text = messageInput.value.trim();
        if (!text) return;

        let path = 'messages';
        if (currentChatType === 'private') {
            const target = recipientInput.value.trim();
            if (!target) return alert("Введите имя получателя");
            path = `privateChats/${getChatId(name, target)}/messages`;
        }

        push(ref(db, path), { name, text, time: Date.now() });
        messageInput.value = '';
        messageInput.style.height = '40px';
        picker.style.display = 'none';
    }

    // Авто-высота
    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    // Отправка по Enter
    messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Эмодзи (Исправлено)
    emojiBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
    });

    picker.addEventListener('emoji-click', event => {
        const emoji = event.detail.unicode;
        messageInput.value += emoji;
        // Важно: триггерим событие, чтобы сработал скрипт авто-высоты
        messageInput.dispatchEvent(new Event('input')); 
        messageInput.focus();
    });

    // Закрыть пикер при клике в любое другое место
    document.addEventListener('click', () => picker.style.display = 'none');
    picker.addEventListener('click', (e) => e.stopPropagation());

    // Вкладки
    btnGeneral.addEventListener('click', () => {
        if (currentChatType === 'general') return;
        currentChatType = 'general';
        btnGeneral.classList.add('active');
        btnPrivate.classList.remove('active');
        recipientInput.style.display = 'none';
        loadChat();
    });

    btnPrivate.addEventListener('click', () => {
        if (currentChatType === 'private') return;
        currentChatType = 'private';
        btnPrivate.classList.add('active');
        btnGeneral.classList.remove('active');
        recipientInput.style.display = 'block';
        loadChat();
    });

    sendBtn.addEventListener('click', sendMessage);
    
    // Перезагружаем чат при смене имен в полях
    usernameInput.addEventListener('blur', loadChat);
    recipientInput.addEventListener('blur', loadChat);
    
    window.addEventListener('load', loadChat);
</script>
