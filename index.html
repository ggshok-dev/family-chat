<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FChat — Семейный чат</title>
    <style>
        :root {
            --bg: #0d1b2a;
            --header: #1b4332;
            --chat-bg: #112233;
            --incoming: #415a77;
            --outgoing: #2d6a4f;
            --text: #e0e1dd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden;
        }

        header { 
            background: var(--header); 
            padding: 14px 16px; 
            text-align: center; 
            font-size: clamp(1.25rem, 4vw, 1.6rem); 
            font-weight: 700; 
        }

        .chat-tabs {
            display: flex;
            background: #1b263b;
            padding: 6px;
            gap: 8px;
        }

        .chat-tabs button {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 9999px;
            background: transparent;
            color: #ccc;
            font-weight: 600;
            cursor: pointer;
        }

        .chat-tabs button.active {
            background: #40916c;
            color: white;
        }

        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 16px 12px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: var(--chat-bg);
        }

        .message { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 20px; 
            font-size: clamp(0.95rem, 3.5vw, 1.05rem); 
            line-height: 1.45;
            position: relative;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .incoming { background: var(--incoming); align-self: flex-start; border-bottom-left-radius: 6px; }
        .outgoing { background: var(--outgoing); align-self: flex-end; border-bottom-right-radius: 6px; }

        .user-name { font-size: 0.78rem; opacity: 0.85; margin-bottom: 4px; font-weight: 600; }
        .message-text { word-break: break-word; margin-bottom: 4px; }
        .message-time { font-size: 0.68rem; opacity: 0.75; text-align: right; margin-top: 4px; }

        .message img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 6px;
        }

        .actions {
            position: absolute;
            top: 8px;
            right: 10px;
            display: none;
            gap: 4px;
        }
        .outgoing:hover .actions { display: flex; }

        .action-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .input-area { 
            background: #1b263b; 
            padding: 12px 12px 18px; 
            box-shadow: 0 -2px 12px rgba(0,0,0,0.5);
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        input {
            padding: 14px 16px;
            border-radius: 9999px;
            border: none; 
            background: #0d1b2a; 
            color: white; 
            font-size: 1rem;
        }

        #username { width: 120px; flex: none; }
        #recipient { flex: 1; }

        #message-input { flex: 1; }

        .input-actions {
            display: flex;
            gap: 8px;
        }

        button, .input-btn {
            background: #40916c; 
            color: white; 
            border: none; 
            padding: 14px 18px; 
            border-radius: 9999px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1rem;
        }

        .input-btn {
            padding: 14px;
            font-size: 1.3rem;
        }

        .welcome {
            align-self: center;
            background: #2d6a4f !important;
            text-align: center;
            font-style: italic;
            max-width: 90% !important;
            padding: 16px !important;
        }
    </style>
</head>
<body>
    <header>FChat — Семейный чат</header>
    
    <div class="chat-tabs">
        <button id="btn-general" class="active">Общий чат</button>
        <button id="btn-private">Личный чат</button>
    </div>

    <div id="chat-window"></div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="username" placeholder="Ваше имя">
            <input type="text" id="recipient" list="recipients" placeholder="Имя получателя" style="display: none;">
            <datalist id="recipients"></datalist>
        </div>
        <div class="input-row">
            <input type="text" id="message-input" placeholder="Напишите сообщение...">
            <div class="input-actions">
                <button class="input-btn" id="emoji-btn" title="Эмодзи">😊</button>
                <button class="input-btn" id="photo-btn" title="Отправить фото">📷</button>
                <button id="send-btn">Отправить</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display: none;">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, update, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGqZPNEL2eihYYxr0ZJoE-Tedg1cO5cVo",
            authDomain: "fchat-d6879.firebaseapp.com",
            databaseURL: "https://fchat-d6879-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fchat-d6879",
            storageBucket: "fchat-d6879.firebasestorage.app",
            messagingSenderId: "1049514912319",
            appId: "1:1049514912319:web:2ec9ca065eca5ac5da668a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        // DOM
        const chatWindow = document.getElementById('chat-window');
        const usernameInput = document.getElementById('username');
        const recipientInput = document.getElementById('recipient');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const emojiBtn = document.getElementById('emoji-btn');
        const photoBtn = document.getElementById('photo-btn');
        const fileInput = document.getElementById('file-input');
        const btnGeneral = document.getElementById('btn-general');
        const btnPrivate = document.getElementById('btn-private');

        let currentChatType = 'general';
        let currentRecipient = '';
        let currentChatRef = null;
        let currentUnsubscribe = null;
        let recentRecipients = JSON.parse(localStorage.getItem('recentRecipients') || '[]');

        const notificationSound = new Audio('https://assets.mixkit.co/sfx/preview/296/296-preview.mp3'); // приятный короткий звук

        function saveRecentRecipient(name) {
            if (!name) return;
            recentRecipients = recentRecipients.filter(n => n.toLowerCase() !== name.toLowerCase());
            recentRecipients.unshift(name);
            if (recentRecipients.length > 8) recentRecipients.pop();
            localStorage.setItem('recentRecipients', JSON.stringify(recentRecipients));
            updateDatalist();
        }

        function updateDatalist() {
            const datalist = document.getElementById('recipients');
            datalist.innerHTML = '';
            recentRecipients.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                datalist.appendChild(opt);
            });
        }

        function getChatId(user1, user2) {
            const u1 = (user1 || '').trim().toLowerCase();
            const u2 = (user2 || '').trim().toLowerCase();
            return u1 < u2 ? `\( {u1}_ \){u2}` : `\( {u2}_ \){u1}`;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const isToday = date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth() && date.getDate() === now.getDate();
            if (isToday) return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            return date.toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

        function clearChat() { chatWindow.innerHTML = ''; }

        function addWelcomeMessage(isPrivate) {
            const text = isPrivate ? `👋 Личный чат с <strong>${currentRecipient}</strong>` : `👋 Общий чат`;
            chatWindow.innerHTML += `<div class="message welcome">${text}</div>`;
            scrollToBottom();
        }

        function addMessage(snapshot) {
            const msg = snapshot.val();
            if (!msg) return;

            const myName = usernameInput.value.trim() || 'Гость';
            const isMy = msg.name === myName;
            const key = snapshot.key;

            let content = '';
            if (msg.imageUrl) {
                content = `<img src="${msg.imageUrl}" alt="Фото">`;
            } else {
                content = `<div class="message-text">${msg.text || ''}</div>`;
            }

            const html = `
                <div class="message \( {isMy ? 'outgoing' : 'incoming'}" data-key=" \){key}">
                    <div class="user-name">${msg.name || 'Аноним'}</div>
                    ${content}
                    <div class="message-time">${formatTime(msg.time || Date.now())}</div>
                    ${isMy ? `
                    <div class="actions">
                        <button class="action-btn edit-btn" title="Редактировать">✏️</button>
                        <button class="action-btn delete-btn" title="Удалить">🗑️</button>
                    </div>` : ''}
                </div>`;
            chatWindow.innerHTML += html;
            scrollToBottom();

            if (isMy) {
                const msgDiv = chatWindow.lastElementChild;
                msgDiv.querySelector('.edit-btn').addEventListener('click', () => editMessage(msgDiv, key, msg.text || ''));
                msgDiv.querySelector('.delete-btn').addEventListener('click', () => deleteMessage(key));
            }

            if (!isMy) {
                notificationSound.currentTime = 0;
                notificationSound.play().catch(() => {});
            }
        }

        function editMessage(msgDiv, key, oldText) {
            // ... (можно оставить как было или упростить)
            alert("Редактирование пока в разработке. Скоро добавлю полноценно!");
            // Для полной версии можно реализовать как раньше
        }

        function deleteMessage(key) {
            if (!confirm("Удалить это сообщение?")) return;
            let chatPath = currentChatType === 'general' ? 'messages' : `privateChats/${getChatId(usernameInput.value, currentRecipient)}/messages`;
            remove(ref(db, `\( {chatPath}/ \){key}`));
            loadChat(); // обновить чат
        }

        async function sendPhoto(file) {
            if (!file) return;
            const name = usernameInput.value.trim() || 'Гость';
            const fileRef = storageRef(storage, `images/\( {Date.now()}_ \){file.name}`);
            
            try {
                await uploadBytes(fileRef, file);
                const imageUrl = await getDownloadURL(fileRef);

                let targetPath = currentChatType === 'general' ? 'messages' : null;
                if (currentChatType === 'private') {
                    const rec = recipientInput.value.trim();
                    if (!rec) return alert("Введите имя получателя");
                    currentRecipient = rec;
                    saveRecentRecipient(rec);
                    const chatId = getChatId(name, rec);
                    targetPath = `privateChats/${chatId}/messages`;
                }

                push(ref(db, targetPath), {
                    name: name,
                    imageUrl: imageUrl,
                    time: Date.now()
                });
            } catch (e) {
                alert("Ошибка загрузки фото: " + e.message);
            }
        }

        function sendMessage() {
            const name = usernameInput.value.trim() || 'Гость';
            const text = messageInput.value.trim();
            if (!text) return;

            let targetPath = currentChatType === 'general' ? 'messages' : null;
            if (currentChatType === 'private') {
                const rec = recipientInput.value.trim();
                if (!rec) return alert("Введите имя получателя");
                currentRecipient = rec;
                saveRecentRecipient(rec);
                const chatId = getChatId(name, rec);
                targetPath = `privateChats/${chatId}/messages`;
            }

            push(ref(db, targetPath), { name, text, time: Date.now() });
            messageInput.value = '';
        }

        // Переключение чатов
        btnGeneral.addEventListener('click', () => {
            currentChatType = 'general';
            btnGeneral.classList.add('active');
            btnPrivate.classList.remove('active');
            recipientInput.style.display = 'none';
            loadChat();
        });

        btnPrivate.addEventListener('click', () => {
            currentChatType = 'private';
            btnGeneral.classList.remove('active');
            btnPrivate.classList.add('active');
            recipientInput.style.display = 'block';
            updateDatalist();
            loadChat();
        });

        // Обработчики
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        emojiBtn.addEventListener('click', () => {
            const emoji = prompt("Вставь эмодзи сюда (или используй клавиатуру телефона):");
            if (emoji) messageInput.value += emoji;
            messageInput.focus();
        });

        photoBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) sendPhoto(e.target.files[0]);
        });

        function loadChat() {
            clearChat();
            if (currentUnsubscribe) currentUnsubscribe();

            let path = currentChatType === 'general' ? 'messages' : null;
            if (currentChatType === 'private') {
                if (!usernameInput.value.trim() || !recipientInput.value.trim()) {
                    alert("Введите своё имя и имя получателя");
                    return;
                }
                currentRecipient = recipientInput.value.trim();
                saveRecentRecipient(currentRecipient);
                const chatId = getChatId(usernameInput.value, currentRecipient);
                path = `privateChats/${chatId}/messages`;
            }

            currentChatRef = ref(db, path);
            addWelcomeMessage(currentChatType === 'private');
            currentUnsubscribe = onChildAdded(currentChatRef, addMessage);
        }

        window.addEventListener('load', () => {
            updateDatalist();
            usernameInput.focus();
            loadChat();
            console.log("✅ FChat с эмодзи, фото и удалением сообщений запущен!");
        });
    </script>
</body>
</html>
