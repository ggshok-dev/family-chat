<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейный мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .messenger {
            width: 400px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-items: flex-end;
        }

        .message.received {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 16px;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.received .message-bubble {
            background: white;
            border: 2px solid #e0e0e0;
        }

        .message-author {
            font-size: 12px;
            margin-bottom: 4px;
            color: #666;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .emoji-picker {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px;
            background: #f9f9f9;
            max-height: 120px;
            overflow-y: auto;
        }

        .emoji-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .emoji-btn:hover {
            background: #e0e0e0;
            transform: scale(1.2);
        }

        .input-box {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #667eea;
        }

        .send-btn, .emoji-toggle {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-btn:hover, .emoji-toggle:hover {
            transform: scale(1.05);
        }

        .sent-time {
            font-size: 12px;
            margin-top: 4px;
            color: #999;
        }

        .family-members {
            display: flex;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            background: white;
            justify-content: center;
        }

        .member {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.3s;
        }

        .member:hover, .member.active {
            opacity: 1;
            transform: scale(1.1);
        }

        .member-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 3px solid transparent;
        }

        .member.active .member-avatar {
            border-color: #667eea;
        }

        .member-name {
            font-size: 12px;
            color: #333;
        }

        .typing-indicator {
            font-size: 14px;
            color: #999;
            padding: 10px 20px;
            display: none;
        }

        .typing-indicator.show {
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="messenger">
        <div class="header">👨‍👩‍👧‍👦 Семейный чат</div>
        
        <div class="family-members">
            <div class="member active" data-user="me">
                <div class="member-avatar" style="background: #667eea;">😎</div>
                <span class="member-name">Я</span>
            </div>
            <div class="member" data-user="mom">
                <div class="member-avatar" style="background: #ff6b6b;">👩</div>
                <span class="member-name">Мама</span>
            </div>
            <div class="member" data-user="dad">
                <div class="member-avatar" style="background: #4ecdc4;">👨</div>
                <span class="member-name">Папа</span>
            </div>
            <div class="member" data-user="sister">
                <div class="member-avatar" style="background: #ffe66d;">👧</div>
                <span class="member-name">Сестра</span>
            </div>
        </div>

        <div class="chat-container" id="chatContainer">
            <!-- Сообщения будут добавляться здесь -->
        </div>

        <div class="typing-indicator" id="typingIndicator">
            Кто-то печатает...
        </div>

        <div class="input-container">
            <div class="emoji-picker" id="emojiPicker" style="display: none;">
                <!-- Эмодзи будут добавлены JavaScript -->
            </div>
            
            <div class="input-box">
                <button class="emoji-toggle" id="emojiToggle">😊</button>
                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                <button class="send-btn" id="sendBtn">📤</button>
            </div>
        </div>
    </div>

    <script>
        // Массив эмодзи для выбора
        const emojis = [
            '😀', '😃', '😄', '😁', '😅', '😂', '🤣', '😊',
            '😇', '🙂', '😉', '😌', '😍', '🥰', '😘', '😗',
            '😋', '😛', '😜', '🤪', '😝', '🤑', '🤗', '🤭',
            '🤫', '🤔', '🤐', '🤨', '😐', '😑', '😶', '😏',
            '😒', '🙄', '😬', '😮', '😯', '😲', '😳', '🥺',
            '😢', '😭', '😤', '😡', '🤬', '😈', '👿', '💀',
            '❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍',
            '👍', '👎', '👏', '🙌', '🤝', '💪', '✌️', '🤞',
            '🌹', '🌸', '🌺', '🌻', '🌼', '💐', '🎉', '🎊',
            '🍕', '🍔', '🍟', '🌭', '🍿', '🧁', '🍰', '🎂'
        ];

        // Сообщения разных членов семьи
        const familyMessages = {
            mom: [
                "Как дела в школе?", "Не забудь пообедать!", "Я приготовила твой любимый пирог 🥧",
                "Когда домой?", "Купи молоко по дороге 🥛", "Папа уже едет с работы"
            ],
            dad: [
                "Как успехи?", "Нужна помощь с уроками?", "Давайте сходим в кино в выходные 🎬",
                "Я задержусь на работе", "Кто хочет пиццу? 🍕"
            ],
            sister: [
                "Привет! Как дела?", "Ты видел новое видео? 📱", "Мам сказала убраться в комнате",
                "Поиграем в настолку? 🎲", "Одолжишь наушники?"
            ]
        };

        let currentUser = 'me';
        
        // DOM элементы
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const emojiToggle = document.getElementById('emojiToggle');
        const emojiPicker = document.getElementById('emojiPicker');
        const typingIndicator = document.getElementById('typingIndicator');
        const members = document.querySelectorAll('.member');

        // Инициализация эмодзи пикера
        function initEmojiPicker() {
            emojis.forEach(emoji => {
                const emojiBtn = document.createElement('button');
                emojiBtn.className = 'emoji-btn';
                emojiBtn.textContent = emoji;
                emojiBtn.addEventListener('click', () => {
                    messageInput.value += emoji;
                    messageInput.focus();
                });
                emojiPicker.appendChild(emojiBtn);
            });
        }

        // Переключение эмодзи пикера
        emojiToggle.addEventListener('click', () => {
            emojiPicker.style.display = emojiPicker.style.display === 'none' ? 'flex' : 'none';
        });

        // Выбор члена семьи
        members.forEach(member => {
            member.addEventListener('click', () => {
                members.forEach(m => m.classList.remove('active'));
                member.classList.add('active');
                currentUser = member.dataset.user;
                
                if (currentUser !== 'me') {
                    simulateTyping();
                }
            });
        });

        // Симуляция печати
        function simulateTyping() {
            typingIndicator.classList.add('show');
            
            setTimeout(() => {
                typingIndicator.classList.remove('show');
                
                if (currentUser !== 'me') {
                    const messages = familyMessages[currentUser];
                    const randomMessage = messages[Math.floor(Math.random() * messages.length)];
                    addMessage(randomMessage, false, getMemberName(currentUser), getMemberEmoji(currentUser));
                }
            }, 2000 + Math.random() * 2000);
        }

        // Получить имя члена семьи
        function getMemberName(user) {
            const names = {
                'me': 'Я',
                'mom': 'Мама',
                'dad': 'Папа',
                'sister': 'Сестра'
            };
            return names[user] || 'Пользователь';
        }

        // Получить эмодзи члена семьи
        function getMemberEmoji(user) {
            const emojis = {
                'me': '😎',
                'mom': '👩',
                'dad': '👨',
                'sister': '👧'
            };
            return emojis[user] || '👤';
        }

        // Добавление сообщения в чат
        function addMessage(text, isSent = true, author = '', avatarEmoji = '') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'sent' : 'received'}`;
            
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            messageDiv.innerHTML = `
                ${!isSent ? `<div class="message-author">${avatarEmoji} ${author}</div>` : ''}
                <div class="message-bubble">${text}</div>
                <div class="sent-time">${timeString}</div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // Анимация появления
            messageDiv.style.opacity = '0';
            messageDiv.style.transform = 'translateY(20px)';
            messageDiv.style.transition = 'all 0.3s ease';
            
            setTimeout(() => {
                messageDiv.style.opacity = '1';
                messageDiv.style.transform = 'translateY(0)';
            }, 50);
        }

        // Отправка сообщения
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text) {
                addMessage(text, true);
                messageInput.value = '';
                
                // Ответ от текущего выбранного члена семьи
                if (currentUser !== 'me') {
                    setTimeout(() => {
                        simulateTyping();
                    }, 1000);
                }
            }
        }

        // Обработчики событий
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Закрытие эмодзи пикера при клике вне его
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.emoji-picker') && 
                !e.target.closest('.emoji-toggle') && 
                emojiPicker.style.display === 'flex') {
                emojiPicker.style.display = 'none';
            }
        });

        // Инициализация
        initEmojiPicker();

        // Добавление приветственного сообщения
        setTimeout(() => {
            addMessage('Добро пожаловать в семейный чат! 👨‍👩‍👧‍👦', false, 'Система', '💬');
        }, 500);

        // Автоответ от мамы при запуске
        setTimeout(() => {
            simulateTyping();
        }, 2000);
    </script>
</body>
</html>
