<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FChat — Семейный мессенджер</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <style>
    :root {
      --font-size-multiplier: 1;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      font-size: calc(1rem * var(--font-size-multiplier));
    }
    
    /* ===== СЕКРЕТНЫЙ КОД ===== */
    .secret-code-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(10px);
    }
    
    .secret-code-dialog {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 350px;
      width: 90%;
      animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .secret-code-dialog h2 {
      color: #333;
      margin-bottom: 10px;
      font-size: calc(1.5rem * var(--font-size-multiplier));
    }
    
    .secret-code-dialog .family-icon {
      font-size: calc(50px * var(--font-size-multiplier));
      margin-bottom: 15px;
    }
    
    .secret-code-dialog p {
      color: #666;
      margin-bottom: 20px;
      font-size: calc(0.9rem * var(--font-size-multiplier));
    }
    
    .secret-code-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: calc(1.1rem * var(--font-size-multiplier));
      text-align: center;
      margin-bottom: 15px;
      outline: none;
      transition: border-color 0.3s;
      letter-spacing: 3px;
    }
    
    .secret-code-input:focus {
      border-color: #667eea;
    }
    
    .secret-code-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: calc(1rem * var(--font-size-multiplier));
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .secret-code-btn:hover {
      transform: scale(1.02);
    }
    
    .error-message {
      color: #ff4444;
      font-size: calc(0.85rem * var(--font-size-multiplier));
      margin-top: 10px;
      display: none;
    }
    
    .error-message.show {
      display: block;
    }
    
    /* ===== ОСНОВНОЕ ПРИЛОЖЕНИЕ ===== */
    .app {
      width: 100%;
      max-width: 450px;
      height: 95vh;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header-logo {
      font-size: calc(28px * var(--font-size-multiplier));
    }
    
    .header-title {
      font-size: calc(1.3rem * var(--font-size-multiplier));
      font-weight: 700;
      flex: 1;
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    .header-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: calc(18px * var(--font-size-multiplier));
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
    }
    
    .header-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.1);
    }
    
    /* User avatars */
    .users-avatars {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 15px;
      background: #f8f9fa;
      border-bottom: 1px solid #eee;
      overflow-x: auto;
    }
    
    .user-avatar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      min-width: 60px;
    }
    
    .user-avatar:hover {
      transform: translateY(-3px);
    }
    
    .avatar-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(24px * var(--font-size-multiplier));
      border: 3px solid transparent;
      transition: all 0.2s;
      background: #e0e0e0;
    }
    
    .user-avatar.active .avatar-circle {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
      transform: scale(1.1);
    }
    
    .avatar-name {
      font-size: calc(0.75rem * var(--font-size-multiplier));
      font-weight: 600;
      color: #666;
    }
    
    .user-avatar.active .avatar-name {
      color: #667eea;
    }
    
    /* Settings panel */
    .settings-panel {
      display: none;
      background: white;
      border-bottom: 1px solid #eee;
      padding: 12px 15px;
      color: #333;
    }
    
    .settings-panel.show {
      display: block;
    }
    
    .settings-panel h3 {
      font-size: calc(1rem * var(--font-size-multiplier));
      margin-bottom: 10px;
      color: #667eea;
    }
    
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }
    
    .setting-item:last-child {
      border-bottom: none;
    }
    
    .setting-label {
      font-size: calc(0.9rem * var(--font-size-multiplier));
      font-weight: 500;
      color: #333;
    }
    
    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 26px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0;
      right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .toggle-slider {
      background-color: #667eea;
    }
    
    input:checked + .toggle-slider:before {
      transform: translateX(24px);
    }
    
    /* Font size buttons */
    .font-size-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .font-size-btn {
      width: 30px;
      height: 30px;
      border: 2px solid #667eea;
      background: white;
      color: #667eea;
      border-radius: 50%;
      font-size: calc(1.2rem * var(--font-size-multiplier));
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .font-size-btn:hover {
      background: #667eea;
      color: white;
    }
    
    .font-size-value {
      font-weight: 600;
      color: #333;
      min-width: 40px;
      text-align: center;
    }
    
    /* Action buttons in settings */
    .action-btn-settings {
      padding: 6px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: calc(0.85rem * var(--font-size-multiplier));
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .action-btn-settings.primary {
      background: #667eea;
      color: white;
    }
    
    .action-btn-settings.danger {
      background: #ff4444;
      color: white;
    }
    
    .action-btn-settings.warning {
      background: #ff9800;
      color: white;
    }
    
    .action-btn-settings:hover {
      transform: scale(1.05);
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      padding: 8px 15px;
      gap: 8px;
      background: white;
      border-bottom: 1px solid #eee;
    }
    
    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: #f0f0f0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: calc(0.9rem * var(--font-size-multiplier));
      transition: all 0.2s;
    }
    
    .tab.active {
      background: #667eea;
      color: white;
    }
    
    /* Private selector */
    .private-selector {
      display: none;
      padding: 8px 15px;
      background: white;
      border-bottom: 1px solid #eee;
      color: #333;
    }
    
    .private-selector select {
      width: 100%;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: calc(0.9rem * var(--font-size-multiplier));
      color: #333;
    }
    
    /* Chat */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .empty-chat {
      text-align: center;
      color: #999;
      margin-top: 40px;
    }
    
    .empty-icon {
      font-size: calc(50px * var(--font-size-multiplier));
      margin-bottom: 10px;
    }
    
    /* Messages */
    .message {
      max-width: 80%;
      animation: slideIn 0.3s;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.sent {
      align-self: flex-end;
    }
    
    .message.received {
      align-self: flex-start;
    }
    
    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.4;
      word-wrap: break-word;
      position: relative;
      font-size: calc(0.95rem * var(--font-size-multiplier));
    }
    
    .sent .bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .received .bubble {
      background: white;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
      color: #333;
    }
    
    .msg-sender {
      font-size: calc(0.75rem * var(--font-size-multiplier));
      font-weight: 600;
      color: #764ba2;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .msg-sender-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: calc(12px * var(--font-size-multiplier));
      background: #e0e0e0;
    }
    
    .msg-time {
      font-size: calc(0.7rem * var(--font-size-multiplier));
      color: #999;
      margin-top: 4px;
      text-align: right;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .sent .msg-time {
      color: rgba(255,255,255,0.8);
    }
    
    .msg-menu-btn {
      cursor: pointer;
      opacity: 0.5;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    .msg-menu-btn:hover {
      opacity: 1;
      background: rgba(0,0,0,0.1);
    }
    
    /* Media */
    .media-img {
      max-width: 200px;
      max-height: 200px;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px 0;
      display: block;
    }
    
    .media-audio {
      margin: 5px 0;
      max-width: 200px;
    }
    
    /* Emoji picker */
    .emoji-picker-wrapper {
      display: none;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      background: white;
      max-height: 300px;
      overflow-y: auto;
      padding: 10px;
    }
    
    .emoji-picker-wrapper.show {
      display: block;
    }
    
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
    }
    
    .emoji-item {
      font-size: calc(1.5rem * var(--font-size-multiplier));
      padding: 5px;
      cursor: pointer;
      text-align: center;
      border-radius: 8px;
      transition: all 0.2s;
      border: none;
      background: none;
    }
    
    .emoji-item:hover {
      background: #f0f0f0;
      transform: scale(1.2);
    }
    
    /* Input */
    .input-panel {
      padding: 12px 15px;
      background: white;
      border-top: 1px solid #eee;
    }
    
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    
    .icon-btn {
      width: 38px;
      height: 38px;
      border: none;
      background: #f0f0f0;
      border-radius: 50%;
      font-size: calc(1.2rem * var(--font-size-multiplier));
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .icon-btn:hover {
      background: #e0e0e0;
      transform: scale(1.05);
    }
    
    .icon-btn.recording {
      background: #ff4444;
      color: white;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(255,68,68,0); }
    }
    
    .msg-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 10px 15px;
      font-size: calc(0.95rem * var(--font-size-multiplier));
      resize: none;
      max-height: 100px;
      font-family: inherit;
      outline: none;
      color: #333;
    }
    
    .msg-input:focus {
      border-color: #667eea;
    }
    
    .send-btn {
      width: 38px;
      height: 38px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 50%;
      font-size: calc(1.2rem * var(--font-size-multiplier));
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .send-btn:hover {
      background: #764ba2;
      transform: scale(1.05);
    }
    
    /* Context menu */
    .context-menu {
      position: fixed;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      z-index: 1000;
      overflow: hidden;
      animation: fadeIn 0.2s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .context-menu button {
      display: block;
      width: 100%;
      padding: 10px 15px;
      border: none;
      background: none;
      text-align: left;
      cursor: pointer;
      font-size: calc(0.9rem * var(--font-size-multiplier));
      transition: background 0.2s;
      color: #333;
    }
    
    .context-menu button:hover {
      background: #f5f5f5;
    }
    
    .danger-btn {
      color: #ff4444;
    }
    
    /* Dark theme - исправленные цвета */
    body.dark-theme .app {
      background: #1a1a2e;
    }
    
    body.dark-theme .chat-window {
      background: #16213e;
    }
    
    body.dark-theme .received .bubble {
      background: #1e2a44;
      border-color: #2a3a5c;
      color: #e8e8e8;
    }
    
    body.dark-theme .msg-sender {
      color: #a78bfa;
    }
    
    body.dark-theme .msg-input {
      background: #1e2a44;
      color: #e8e8e8;
      border-color: #2a3a5c;
    }
    
    body.dark-theme .msg-input::placeholder {
      color: #6b7280;
    }
    
    body.dark-theme .input-panel,
    body.dark-theme .tabs,
    body.dark-theme .users-avatars,
    body.dark-theme .private-selector {
      background: #1a1a2e;
      border-color: #2a3a5c;
    }
    
    body.dark-theme .settings-panel {
      background: #1a1a2e;
      border-color: #2a3a5c;
      color: #e8e8e8;
    }
    
    body.dark-theme .settings-panel h3 {
      color: #a78bfa;
    }
    
    body.dark-theme .setting-item {
      border-color: #2a3a5c;
      color: #e8e8e8;
    }
    
    body.dark-theme .setting-label {
      color: #e8e8e8;
    }
    
    body.dark-theme .font-size-btn {
      background: #1e2a44;
      color: #a78bfa;
      border-color: #a78bfa;
    }
    
    body.dark-theme .font-size-btn:hover {
      background: #a78bfa;
      color: white;
    }
    
    body.dark-theme .font-size-value {
      color: #e8e8e8;
    }
    
    body.dark-theme .tab {
      background: #1e2a44;
      color: #e8e8e8;
    }
    
    body.dark-theme .tab.active {
      background: #667eea;
      color: white;
    }
    
    body.dark-theme .icon-btn {
      background: #1e2a44;
      color: #e8e8e8;
    }
    
    body.dark-theme .avatar-name {
      color: #c0c0c0;
    }
    
    body.dark-theme .emoji-picker-wrapper {
      background: #1e2a44;
      border-color: #2a3a5c;
    }
    
    body.dark-theme .emoji-item:hover {
      background: #2a3a5c;
    }
    
    body.dark-theme .context-menu {
      background: #1e2a44;
      box-shadow: 0 5px 25px rgba(0,0,0,0.5);
    }
    
    body.dark-theme .context-menu button {
      color: #e8e8e8;
    }
    
    body.dark-theme .context-menu button:hover {
      background: #2a3a5c;
    }
    
    body.dark-theme .secret-code-dialog {
      background: #1e2a44;
    }
    
    body.dark-theme .secret-code-dialog h2 {
      color: #e8e8e8;
    }
    
    body.dark-theme .secret-code-dialog p {
      color: #c0c0c0;
    }
    
    body.dark-theme .secret-code-input {
      background: #16213e;
      color: white;
      border-color: #2a3a5c;
    }
    
    body.dark-theme select {
      background: #1e2a44;
      color: #e8e8e8;
      border-color: #2a3a5c;
    }
    
    body.dark-theme .action-btn-settings.primary {
      background: #667eea;
    }
    
    body.dark-theme .empty-chat {
      color: #6b7280;
    }
    
    /* Mobile optimizations */
    @media (max-width: 480px) {
      .app {
        height: 100vh;
        border-radius: 0;
      }
      
      body {
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <!-- Секретный код семьи -->
  <div class="secret-code-overlay" id="secretCodeOverlay">
    <div class="secret-code-dialog">
      <div class="family-icon">👨‍👩‍👧‍👦</div>
      <h2>Семейный чат</h2>
      <p>Введите секретный код семьи для входа</p>
      <input type="password" class="secret-code-input" id="secretCodeInput" 
             placeholder="••••" maxlength="10" autocomplete="off" inputmode="text">
      <button class="secret-code-btn" id="secretCodeBtn">Войти</button>
      <div class="error-message" id="errorMessage">Неверный код</div>
      <p style="margin-top: 15px; font-size: calc(0.8rem * var(--font-size-multiplier)); color: #999;">
        Подсказка: код по умолчанию "family2024"
      </p>
    </div>
  </div>

  <!-- Основное приложение -->
  <div class="app" id="mainApp" style="display: none;">
    <!-- Header -->
    <div class="header">
      <span class="header-logo">👨‍👩‍👧‍👦</span>
      <span class="header-title">FChat</span>
      <div class="header-actions">
        <button class="header-btn" id="notificationBtn" title="Уведомления">🔔</button>
        <button class="header-btn" id="soundBtn" title="Звук">🔊</button>
        <button class="header-btn" id="themeBtn" title="Тема">🌙</button>
        <button class="header-btn" id="settingsBtn" title="Настройки">⚙️</button>
      </div>
    </div>

    <!-- Settings panel -->
    <div class="settings-panel" id="settingsPanel">
      <h3>⚙️ Настройки</h3>
      
      <div class="setting-item">
        <span class="setting-label">🔔 Push-уведомления</span>
        <label class="toggle-switch">
          <input type="checkbox" id="notificationsToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
      
      <div class="setting-item">
        <span class="setting-label">🔊 Звуковые уведомления</span>
        <label class="toggle-switch">

    function playNotificationSound() {
      if (!soundEnabled) return;
      
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        gainNode.gain.value = 0.1;
        
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        oscillator.stop(audioCtx.currentTime + 0.3);
      } catch (e) {
        console.log('Audio not supported');
      }
    }

    function getChatPath() {
      if (activeTab === 'private' && privateWith) {

    function subscribeToMessages() {
      if (messageListener) {
        db.ref(getChatPath()).off('child_added', messageListener);
      }

      const chatRef = db.ref(getChatPath());
      
      document.getElementById('chatWindow').innerHTML = `
        <div class="empty-chat">
          <div class="empty-icon">💬</div>
          <p>Нет сообщений</p>
        </div>
      `;

      messageListener = chatRef.on('child_added', (snap) => {
        const msg = snap.val();
        msg.id = snap.key;
        displayMessage(msg);
        
        if (msg.from !== currentUser) {
          const sender = FAMILY[msg.from] || { name: 'Кто-то' };
          showNotification(
            `${sender.emoji} ${sender.name}`,
            msg.type === 'image' ? '📷 Отправил(а) фото' : 
            msg.type === 'voice' ? '🎤 Отправил(а) голосовое' : 
            msg.text || 'Новое сообщение'
          );
        }
      });

      chatRef.on('child_changed', (snap) => {
        const msg = snap.val();
        msg.id = snap.key;
        updateMessage(msg);
      });

      chatRef.on('child_removed', (snap) => {
        const el = document.querySelector(`[data-id="${snap.key}"]`);
        if (el) el.remove();
      });
    }

    function displayMessage(msg) {
      const chatWindow = document.getElementById('chatWindow');
      const emptyEl = chatWindow.querySelector('.empty-chat');

      const isSent = msg.from === currentUser;
      const sender = FAMILY[msg.from] || { name: 'Неизвестный', emoji: '👤', color: '#999' };
      
      const div = document.createElement('div');
      div.className = `message ${isSent ? 'sent' : 'received'}`;
      div.dataset.id = msg.id;
      
      let content = '';
      
      if (msg.type === 'image') {
        content = `<img src="${msg.data}" class="media-img" alt="Фото" loading="lazy" 
                   onclick="this.requestFullscreen?.()">`;
      } else if (msg.type === 'voice') {
        content = `<audio controls class="media-audio" src="${msg.data}"></audio>`;
      } else {
        content = msg.text || '';
      }

      const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { 
        hour: '2-digit', minute: '2-digit' 
      });

      div.innerHTML = `

          e.stopPropagation();
          showContextMenu(e, msg);
        });

    function showContextMenu(event, msg) {
      const existing = document.querySelector('.context-menu');
      if (existing) existing.remove();

      const menu = document.createElement('div');
      menu.className = 'context-menu';
      menu.innerHTML = `

      menu.style.top = event.clientY + 'px';

        menu.remove();

        menu.remove();

          db.ref(`${getChatPath()}/${msg.id}`).remove();
        }
      });

      setTimeout(() => {
        const handler = () => {
          menu.remove();
          document.removeEventListener('click', handler);
        };
        document.addEventListener('click', handler);
      }, 0);
    }

    // ============ SEND ============
    async function sendMessage(text) {
      if (!text.trim()) return;
      
      const msg = {
        from: currentUser,
        text: text.trim(),
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        type: 'text'

      if (autoDeleteHours > 0) {

      await db.ref(getChatPath()).push(msg);
      document.getElementById('msgInput').value = '';
    }

    async function sendMedia(type, dataUrl) {
      let finalData = dataUrl;
      if (type === 'image' && dataUrl.length > 500000) {
        finalData = await compressImage(dataUrl);
      }
      
      const msg = {
        from: currentUser,
        type: type,
        data: finalData,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        text: type === 'image' ? '📷 Фото' : '🎤 Голосовое сообщение'
      };
      
      if (autoDeleteHours > 0) {
        msg.deleteAt = Date.now() + (autoDeleteHours * 3600000);
      }
      
      await db.ref(getChatPath()).push(msg);
    }

    function compressImage(dataUrl, maxWidth = 800) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          
          if (width > maxWidth) {
            height = (height * maxWidth) / width;
            width = maxWidth;
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = dataUrl;
      });
    }

      });

      document.getElementById('attachBtn').addEventListener('click', () => {
        document.getElementById('fileInput').click();
      });

      document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            sendMedia('image', ev.target.result);
          };
          reader.readAsDataURL(file);
        }
      });

      document.getElementById('micBtn').addEventListener('click', async () => {
        const micBtn = document.getElementById('micBtn');
        
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
          micBtn.classList.remove('recording');
          micBtn.textContent = '🎤';
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = (e) => {
            audioChunks.push(e.data);
          };

          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = (ev) => {
              sendMedia('voice', ev.target.result);
            };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(t => t.stop());
          };

          mediaRecorder.start();
          micBtn.classList.add('recording');
          micBtn.textContent = '⏹️';

          setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
              mediaRecorder.stop();
              micBtn.classList.remove('recording');
              micBtn.textContent = '🎤';
            }
          }, 10000);
        } catch (err) {
          alert('Микрофон недоступен: ' + err.message);
        }
      });

      document.getElementById('settingsBtn').addEventListener('click', () => {
        document.getElementById('settingsPanel').classList.toggle('show');
      });

      document.getElementById('themeBtn').addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        const isDark = document.body.classList.contains('dark-theme');
        document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('fc_theme', isDark ? 'dark' : 'light');
      });

      document.getElementById('notificationsToggle').addEventListener('change', (e) => {
        notificationsEnabled = e.target.checked;
        localStorage.setItem('fc_notifications', notificationsEnabled);
        document.getElementById('notificationBtn').textContent = notificationsEnabled ? '🔔' : '🔕';
        
        if (notificationsEnabled) {
          requestNotificationPermission();
        }
      });

      document.getElementById('soundToggle').addEventListener('change', (e) => {
        soundEnabled = e.target.checked;
        localStorage.setItem('fc_sound', soundEnabled);
        document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
      });

      document.getElementById('autoDeleteSelect').addEventListener('change', (e) => {
        autoDeleteHours = parseInt(e.target.value);
        localStorage.setItem('fc_autoDelete', autoDeleteHours);
      });

      document.getElementById('clearChatBtn').addEventListener('click', () => {
        if (confirm('Удалить все сообщения в этом чате?')) {
          db.ref(getChatPath()).remove();
        }
      });
    }

    function loadSettings() {
      const theme = localStorage.getItem('fc_theme') || 'light';
      if (theme === 'dark') {
        document.body.classList.add('dark-theme');
        document.getElementById('themeBtn').textContent = '☀️';
      }

      notificationsEnabled = localStorage.getItem('fc_notifications') !== 'false';
      document.getElementById('notificationsToggle').checked = notificationsEnabled;
      document.getElementById('notificationBtn').textContent = notificationsEnabled ? '🔔' : '🔕';

      soundEnabled = localStorage.getItem('fc_sound') !== 'false';
      document.getElementById('soundToggle').checked = soundEnabled;
      document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';

      autoDeleteHours = parseInt(localStorage.getItem('fc_autoDelete') || '24');
      document.getElementById('autoDeleteSelect').value = autoDeleteHours;
    }

    // ============ AUTO DELETE ============
    function startAutoDelete() {
      setInterval(async () => {
        if (autoDeleteHours === 0) return;
        
        const chatRef = db.ref(getChatPath());
        const snap = await chatRef.once('value');
        const msgs = snap.val();
        
        if (!msgs) return;
        
        const now = Date.now();
        const updates = {};
        
        for (const [id, msg] of Object.entries(msgs)) {
          if (msg.deleteAt && msg.deleteAt <= now) {
            updates[id] = null;
          }
        }
        
        if (Object.keys(updates).length > 0) {
          await chatRef.update(updates);
        }
      }, 30000);
    }
  </script>
</body>
</html>
