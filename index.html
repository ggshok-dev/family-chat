<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FChat — Семейный мессенджер</title>
  
  <meta name="theme-color" content="#667eea">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <style>
    :root { --font-scale: 1; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
    body.dark-theme { background: #0f0f1a; }
    .secret-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 9999; }
    .secret-dialog { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 350px; width: 90%; }
    .secret-input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1.1rem; text-align: center; margin: 15px 0; outline: none; background: white; color: #333; display: block; }
    .secret-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; background: #667eea; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .error-msg { color: #ff4444; margin-top: 10px; display: none; }
    .error-msg.show { display: block; }
    .pin-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9998; }
    .pin-dialog { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 350px; width: 90%; }
    .pin-input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1.3rem; text-align: center; margin: 15px 0; outline: none; letter-spacing: 6px; background: white; color: #333; display: block; }
    .pin-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; background: #667eea; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .app { width: 100%; max-width: 450px; height: 95vh; background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); display: none; flex-direction: column; overflow: hidden; }
    .header { background: #667eea; color: white; padding: 15px; display: flex; align-items: center; gap: 10px; }
    .header-title { font-weight: 700; flex: 1; }
    .header-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    .users-avatars { display: flex; justify-content: center; gap: 15px; padding: 15px; background: #f8f9fa; overflow-x: auto; }
    .user-avatar { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; opacity: 0.6; }
    .user-avatar.active { opacity: 1; }
    .avatar-circle { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 3px solid transparent; background: #e0e0e0; overflow: hidden; }
    .user-avatar.active .avatar-circle { border-color: #667eea; }
    .avatar-name { font-size: 0.75rem; font-weight: 600; }
    .tabs { display: flex; padding: 8px 15px; gap: 8px; background: white; }
    .tab { flex: 1; padding: 8px; border: none; background: #f0f0f0; border-radius: 12px; cursor: pointer; font-weight: 600; }
    .tab.active { background: #667eea; color: white; }
    .chat-window { flex: 1; overflow-y: auto; padding: 15px; background: #f5f5f5; display: flex; flex-direction: column; gap: 8px; }
    .empty-chat { text-align: center; color: #999; margin-top: 40px; }
    .empty-icon { font-size: 50px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 15px; }
    .message.sent { background: #667eea; color: white; align-self: flex-end; }
    .message.received { background: white; align-self: flex-start; }
    .input-panel { padding: 10px 15px; background: white; display: flex; gap: 8px; }
    .msg-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; font-size: 0.95rem; resize: none; outline: none; }
    .send-btn { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 20px; cursor: pointer; }
    .settings-panel { display: none; background: white; padding: 15px; max-height: 60vh; overflow-y: auto; }
    .settings-panel.show { display: block; }
    .setting-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .action-btn { padding: 6px 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    .action-btn.primary { background: #667eea; color: white; }
    .action-btn.danger { background: #ff4444; color: white; }
    .action-btn.warning { background: #ff9800; color: white; }
    .emoji-picker-wrapper { display: none; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; background: white; padding: 10px; }
    .emoji-picker-wrapper.show { display: block; }
    .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; max-height: 200px; overflow-y: auto; }
    .emoji-item { font-size: 1.3rem; padding: 5px; cursor: pointer; text-align: center; border: none; background: none; }
    .icon-btn { width: 38px; height: 38px; border: none; background: #f0f0f0; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
    .private-selector { display: none; padding: 8px 15px; background: white; }
    .private-selector select { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #ddd; }
    .private-chat-header { display: none; padding: 8px 15px; background: #e8f5e9; }
    @media (max-width: 480px) { .app { height: 100vh; border-radius: 0; } body { padding: 0; } }
  </style>
</head>
<body>
  <div class="secret-overlay" id="secretOverlay">
    <div class="secret-dialog">
      <div style="font-size:50px;">👨‍👩‍👧‍👦</div>
      <h2>Семейный чат</h2>
      <p>Введите секретный код семьи</p>
      <input type="password" class="secret-input" id="secretInput" placeholder="••••" maxlength="10">
      <button class="secret-btn" id="secretBtn">Войти</button>
      <div class="error-msg" id="errorMsg">Неверный код</div>
      <p style="margin-top:10px;font-size:0.8rem;opacity:0.7;">По умолчанию: family2024</p>
    </div>
  </div>

  <div class="pin-overlay" id="pinOverlay">
    <div class="pin-dialog">
      <div style="font-size:60px;" id="pinUserIcon">👤</div>
      <h2 id="pinTitle">Введите ПИН-код</h2>
      <p>Для входа как <strong id="pinUserName"></strong></p>
      <input type="password" class="pin-input" id="pinInput" placeholder="••••" maxlength="4" inputmode="numeric">
      <button class="pin-btn" id="pinBtn">Подтвердить</button>
      <div class="error-msg" id="pinError">Неверный ПИН-код</div>
      <p style="margin-top:10px;font-size:0.8rem;opacity:0.7;"><span id="pinHint"></span></p>
    </div>
  </div>

  <div class="app" id="mainApp">
    <div class="header">
      <span>👨‍👩‍👧‍👦</span>
      <span class="header-title">FChat</span>
      <button class="header-btn" id="themeBtn">🌙</button>
      <button class="header-btn" id="settingsBtn">⚙️</button>
    </div>

    <div class="settings-panel" id="settingsPanel">
      <h3>⚙️ Настройки</h3>
      <div class="setting-item"><span>🔑 Код семьи</span><button class="action-btn primary" id="changeCodeBtn">Изменить</button></div>
      <div class="setting-item"><span>🗑️ Очистить чат</span><button class="action-btn danger" id="clearBtn">Удалить всё</button></div>
    </div>

    <div class="users-avatars" id="usersAvatars"></div>

    <div class="tabs">
      <button class="tab active" data-tab="general">💬 Общий</button>
      <button class="tab" data-tab="private">🔒 Личный</button>
    </div>

    <div class="private-chat-header" id="privateChatHeader">
      <span>🔒 Личный чат с</span>
      <strong class="partner-name"></strong>
    </div>

    <div class="private-selector" id="privateSel">
      <select id="privateRecipient"><option value="">Выберите...</option></select>
    </div>

    <div class="chat-window" id="chatWindow">
      <div class="empty-chat"><div class="empty-icon">💬</div><p>Нет сообщений</p></div>
    </div>

    <div class="input-panel">
      <div class="emoji-picker-wrapper" id="emojiPicker"><div class="emoji-grid" id="emojiGrid"></div></div>
      <button class="icon-btn" id="emojiBtn">😊</button>
      <textarea class="msg-input" id="msgInput" rows="1" placeholder="Сообщение..."></textarea>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyAGqZPNEL2eihYYxr0ZJoE-Tedg1cO5cVo",
        authDomain: "fchat-d6879.firebaseapp.com",
        databaseURL: "https://fchat-d6879-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "fchat-d6879",
        storageBucket: "fchat-d6879.firebasestorage.app",
        messagingSenderId: "1049514912319",
        appId: "1:1049514912319:web:2ec9ca065eca5ac5da668a"
      };
      
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
      
      const FAMILY = {
        dad: { id: 'dad', name: 'Папа', emoji: '👨' },
        mom: { id: 'mom', name: 'Мама', emoji: '👩' },
        sergey: { id: 'sergey', name: 'Сергей', emoji: '👦' },
        sveta: { id: 'sveta', name: 'Света', emoji: '👧' },
        katya: { id: 'katya', name: 'Катя', emoji: '👧' }
      };
      
      const EMOJI_LIST = ['😀','😂','🤣','😊','😍','🥰','😘','😎','🤩','😇','🤗','🤔','😴','😢','😡','👍','❤️','💔','🎉','🔥','🌟','👨‍👩‍👧‍👦','🏠','🎂','🍕','☕'];
      
      let currentUser = null;
      let activeTab = 'general';
      let privateWith = null;
      let secretCode = localStorage.getItem('fc_code') || 'family2024';
      let pendingPinUser = null;
      
      if (!localStorage.getItem('fc_code')) localStorage.setItem('fc_code', 'family2024');
      
      function getPin(uid) { return localStorage.getItem('fc_pin_' + uid); }
      function setPin(uid, pin) { localStorage.setItem('fc_pin_' + uid, pin); }
      function hasPin(uid) { return !!getPin(uid); }
      function verifyPin(uid, pin) { return getPin(uid) === pin; }
      
      function showPinDialog(userId) {
        pendingPinUser = userId;
        const user = FAMILY[userId];
        document.getElementById('pinUserIcon').textContent = user.emoji;
        document.getElementById('pinUserName').textContent = user.name;
        document.getElementById('pinTitle').textContent = hasPin(userId) ? 'Введите ПИН-код' : 'Создайте ПИН-код';
        document.getElementById('pinHint').textContent = hasPin(userId) ? 'Введите ваш 4-значный ПИН' : 'Придумайте 4 цифры';
        document.getElementById('pinInput').value = '';
        document.getElementById('pinError').classList.remove('show');
        document.getElementById('pinOverlay').style.display = 'flex';
        document.getElementById('pinInput').focus();
      }
      
      function hidePinDialog() {
        document.getElementById('pinOverlay').style.display = 'none';
        pendingPinUser = null;
      }
      
      function processPin() {
        const pin = document.getElementById('pinInput').value.trim();
        if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) {
          document.getElementById('pinError').textContent = 'ПИН должен состоять из 4 цифр';
          document.getElementById('pinError').classList.add('show');
          return;
        }
        if (hasPin(pendingPinUser)) {
          if (verifyPin(pendingPinUser, pin)) { loginAsUser(pendingPinUser); hidePinDialog(); }
          else { document.getElementById('pinError').textContent = 'Неверный ПИН-код'; document.getElementById('pinError').classList.add('show'); }
        } else {
          setPin(pendingPinUser, pin);
          loginAsUser(pendingPinUser);
          hidePinDialog();
          alert('✅ ПИН-код создан!');
        }
      }
      
      function loginAsUser(userId) {
        currentUser = userId;
        localStorage.setItem('fc_user', userId);
        renderUsers();
        updatePrivate();
        loadMessages();
      }
      
      function renderUsers() {
        const container = document.getElementById('usersAvatars');
        container.innerHTML = Object.values(FAMILY).map(m => 
          `<div class="user-avatar ${m.id === currentUser ? 'active' : ''}" data-user="${m.id}">
            <div class="avatar-circle">${m.emoji}</div>
            <span class="avatar-name">${m.name}</span>
          </div>`
        ).join('');
        
        container.querySelectorAll('.user-avatar').forEach(av => {
          av.addEventListener('click', function() {
            const uid = this.dataset.user;
            if (uid === currentUser) return;
            if (currentUser && activeTab === 'general' && hasPin(uid)) {
              if (confirm('Перейти в личный чат с ' + FAMILY[uid].name + '?')) {
                switchToPrivate(uid);
                return;
              }
            }
            showPinDialog(uid);
          });
        });
      }
      
      function getChatPath() {
        if (!currentUser) return 'general';
        if (activeTab === 'private' && privateWith) {
          const u = [currentUser, privateWith].sort();
          return 'private/' + u[0] + '_' + u[1];
        }
        return 'general';
      }
      
      function loadMessages() {
        if (!currentUser) return;
        const ref = db.ref(getChatPath());
        const chat = document.getElementById('chatWindow');
        
        ref.off('child_added');
        ref.once('value', snap => {
          const msgs = snap.val();
          chat.innerHTML = '';
          if (!msgs) { chat.innerHTML = '<div class="empty-chat"><div class="empty-icon">💬</div><p>Нет сообщений</p></div>'; return; }
          Object.entries(msgs)
            .map(e => Object.assign({id: e[0]}, e[1]))
            .sort((a,b) => (a.timestamp||0) - (b.timestamp||0))
            .forEach(m => showMessage(m));
        });
        
        ref.on('child_added', snap => {
          showMessage(Object.assign({id: snap.key}, snap.val()));
        });
      }
      
      function showMessage(msg) {
        const chat = document.getElementById('chatWindow');
        const empty = chat.querySelector('.empty-chat');
        if (empty) empty.remove();
        
        const div = document.createElement('div');
        div.className = 'message ' + (msg.from === currentUser ? 'sent' : 'received');
        const sender = FAMILY[msg.from] || {name: 'Кто-то', emoji: '👤'};
        div.innerHTML = `<strong>${sender.emoji} ${sender.name}</strong><br>${msg.text || ''}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }
      
      function sendText(text) {
        if (!currentUser) { alert('Выберите пользователя'); return; }
        if (!text.trim()) return;
        db.ref(getChatPath()).push({
          from: currentUser,
          text: text.trim(),
          timestamp: Date.now()
        });
        document.getElementById('msgInput').value = '';
      }
      
      function switchToPrivate(uid) {
        activeTab = 'private';
        privateWith = uid;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector('.tab[data-tab="private"]').classList.add('active');
        document.getElementById('privateSel').style.display = 'block';
        updatePrivate();
        loadMessages();
        document.getElementById('privateChatHeader').style.display = 'flex';
        document.querySelector('.partner-name').textContent = FAMILY[uid].name;
      }
      
      function updatePrivate() {
        const sel = document.getElementById('privateRecipient');
        const others = Object.values(FAMILY).filter(m => m.id !== currentUser);
        sel.innerHTML = '<option value="">Выберите...</option>' +
          others.map(m => `<option value="${m.id}" ${m.id===privateWith?'selected':''}>${m.emoji} ${m.name}</option>`).join('');
      }
      
      // Секретный код
      document.getElementById('secretBtn').addEventListener('click', function() {
        if (document.getElementById('secretInput').value === secretCode) {
          document.getElementById('secretOverlay').style.display = 'none';
          document.getElementById('mainApp').style.display = 'flex';
          initApp();
        } else {
          document.getElementById('errorMsg').classList.add('show');
          document.getElementById('secretInput').value = '';
        }
      });
      
      document.getElementById('secretInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') document.getElementById('secretBtn').click();
      });
      
      document.getElementById('secretInput').focus();
      
      // ПИН
      document.getElementById('pinBtn').addEventListener('click', processPin);
      document.getElementById('pinInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') processPin();
      });
      document.getElementById('pinOverlay').addEventListener('click', function(e) {
        if (e.target === this) hidePinDialog();
      });
      
      // Отправка
      document.getElementById('sendBtn').addEventListener('click', function() {
        sendText(document.getElementById('msgInput').value);
      });
      
      document.getElementById('msgInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(this.value); }
      });
      
      // Вкладки
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          activeTab = this.dataset.tab;
          document.getElementById('privateSel').style.display = activeTab === 'private' ? 'block' : 'none';
          if (activeTab !== 'private') privateWith = null;
          updatePrivate();
          loadMessages();
          document.getElementById('privateChatHeader').style.display = 'none';
        });
      });
      
      document.getElementById('privateRecipient').addEventListener('change', function() {
        privateWith = this.value;
        if (privateWith) {
          loadMessages();
          document.getElementById('privateChatHeader').style.display = 'flex';
          document.querySelector('.partner-name').textContent = FAMILY[privateWith].name;
        }
      });
      
      // Настройки
      document.getElementById('settingsBtn').addEventListener('click', function() {
        document.getElementById('settingsPanel').classList.toggle('show');
      });
      
      document.getElementById('themeBtn').addEventListener('click', function() {
        document.body.classList.toggle('dark-theme');
        this.textContent = document.body.classList.contains('dark-theme') ? '☀️' : '🌙';
      });
      
      document.getElementById('changeCodeBtn').addEventListener('click', function() {
        const old = prompt('Текущий код:');
        if (old !== secretCode) { alert('Неверно'); return; }
        const newCode = prompt('Новый код:');
        if (newCode && newCode.length >= 4) {
          secretCode = newCode;
          localStorage.setItem('fc_code', secretCode);
          alert('✅ Код изменён!');
        }
      });
      
      document.getElementById('clearBtn').addEventListener('click', function() {
        if (!currentUser) return;
        if (confirm('Удалить все сообщения?')) db.ref(getChatPath()).remove();
      });
      
      // Эмодзи
      const emojiGrid = document.getElementById('emojiGrid');
      emojiGrid.innerHTML = EMOJI_LIST.map(e => `<button class="emoji-item">${e}</button>`).join('');
      emojiGrid.querySelectorAll('.emoji-item').forEach(btn => {
        btn.addEventListener('click', function() {
          document.getElementById('msgInput').value += this.textContent;
          document.getElementById('msgInput').focus();
        });
      });
      
      document.getElementById('emojiBtn').addEventListener('click', function() {
        document.getElementById('emojiPicker').classList.toggle('show');
      });
      
      function initApp() {
        renderUsers();
        const savedUser = localStorage.getItem('fc_user');
        if (savedUser && FAMILY[savedUser]) {
          showPinDialog(savedUser);
        } else {
          document.getElementById('chatWindow').innerHTML = '<div class="empty-chat"><div class="empty-icon">🔒</div><p>Выберите пользователя</p></div>';
        }
        console.log('✅ FChat запущен');
      }
    });
  </script>
  
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
