<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FChat — Семейный чат</title>
    <style>
        :root {
            --bg: #0d1b2a;
            --header: #1b4332;
            --chat-bg: #112233;
            --incoming: #415a77;
            --outgoing: #2d6a4f;
            --text: #e0e1dd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100dvh;          /* важно для мобильных с клавиатурой */
            overflow: hidden;
        }

        header { 
            background: var(--header); 
            padding: 14px 16px; 
            text-align: center; 
            font-size: clamp(1.25rem, 4vw, 1.6rem); 
            font-weight: 700; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .chat-tabs {
            display: flex;
            background: #1b263b;
            padding: 6px;
            gap: 8px;
        }

        .chat-tabs button {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 9999px;
            background: transparent;
            color: #ccc;
            font-weight: 600;
            cursor: pointer;
        }

        .chat-tabs button.active {
            background: #40916c;
            color: white;
        }

        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 16px 12px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background: var(--chat-bg);
        }

        .message { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 20px; 
            font-size: clamp(0.95rem, 3.5vw, 1.05rem); 
            line-height: 1.45;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .incoming { 
            background: var(--incoming); 
            align-self: flex-start; 
            border-bottom-left-radius: 6px;
        }

        .outgoing { 
            background: var(--outgoing); 
            align-self: flex-end; 
            border-bottom-right-radius: 6px;
        }

        .user-name { 
            font-size: 0.78rem; 
            opacity: 0.85; 
            margin-bottom: 4px; 
            font-weight: 600; 
        }

        .message-time { 
            font-size: 0.68rem; 
            opacity: 0.75; 
            text-align: right; 
            margin-top: 4px;
        }

        .input-area { 
            background: #1b263b; 
            padding: 12px 12px 18px; 
            box-shadow: 0 -2px 12px rgba(0,0,0,0.5);
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        input {
            padding: 14px 16px;
            border-radius: 9999px;
            border: none; 
            background: #0d1b2a; 
            color: white; 
            font-size: 1rem;
        }

        #username { width: 120px; flex: none; }
        #recipient { flex: 1; display: none; }

        #message-input { flex: 1; }

        button { 
            background: #40916c; 
            color: white; 
            border: none; 
            padding: 14px 24px; 
            border-radius: 9999px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1rem;
        }

        button:hover { background: #52b788; }

        .welcome {
            align-self: center;
            background: #2d6a4f !important;
            text-align: center;
            font-style: italic;
            max-width: 90% !important;
            padding: 16px !important;
        }

        @media (min-width: 768px) {
            .input-area { flex-direction: row; align-items: center; padding: 14px 20px; }
            .input-row { margin-bottom: 0; }
            #username { width: 150px; }
            .message { max-width: 70%; }
        }
    </style>
</head>
<body>
    <header>FChat — Семейный чат</header>
    
    <div class="chat-tabs">
        <button id="btn-general" class="active">Общий чат</button>
        <button id="btn-private">Личный чат</button>
    </div>

    <div id="chat-window"></div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="username" placeholder="Ваше имя">
            <input type="text" id="recipient" placeholder="Имя получателя">
        </div>
        <div class="input-row">
            <input type="text" id="message-input" placeholder="Напишите сообщение...">
            <button id="send-btn">Отправить</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGqZPNEL2eihYYxr0ZJoE-Tedg1cO5cVo",
            authDomain: "fchat-d6879.firebaseapp.com",
            databaseURL: "https://fchat-d6879-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fchat-d6879",
            storageBucket: "fchat-d6879.firebasestorage.app",
            messagingSenderId: "1049514912319",
            appId: "1:1049514912319:web:2ec9ca065eca5ac5da668a",
            measurementId: "G-11PJ481DDP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const chatWindow = document.getElementById('chat-window');
        const usernameInput = document.getElementById('username');
        const recipientInput = document.getElementById('recipient');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const btnGeneral = document.getElementById('btn-general');
        const btnPrivate = document.getElementById('btn-private');

        let currentChatType = 'general';
        let currentRecipient = '';
        let currentChatRef = null;
        let currentUnsubscribe = null;

        function getChatId(user1, user2) {
            const u1 = (user1 || '').trim().toLowerCase();
            const u2 = (user2 || '').trim().toLowerCase();
            return u1 < u2 ? `${u1}_${u2}` : `${u2}_${u1}`;
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const isToday = date.getFullYear() === now.getFullYear() &&
                            date.getMonth() === now.getMonth() &&
                            date.getDate() === now.getDate();

            if (isToday) {
                return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            }
            return date.toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function clearChat() {
            chatWindow.innerHTML = '';
        }

        function addWelcomeMessage(isPrivate) {
            const text = isPrivate 
                ? `👋 Личный чат с <strong>${currentRecipient}</strong>. Только вы двое видите сообщения.`
                : `👋 Добро пожаловать в общий чат!`;
            chatWindow.innerHTML += `<div class="message welcome">${text}</div>`;
            scrollToBottom();
        }

        function addMessage(snapshot) {
            const msg = snapshot.val();
            if (!msg?.text) return;

            const myName = usernameInput.value.trim() || 'Гость';
            const isMy = msg.name === myName;

            const html = `
                <div class="message ${isMy ? 'outgoing' : 'incoming'}">
                    <div class="user-name">${msg.name || 'Аноним'}</div>
                    <div>${msg.text}</div>
                    <div class="message-time">${formatTime(msg.time || Date.now())}</div>
                </div>`;
            chatWindow.innerHTML += html;
            scrollToBottom();
        }

        function loadChat() {
            clearChat();
            if (currentUnsubscribe) currentUnsubscribe();

            let path = currentChatType === 'general' ? 'messages' : null;

            if (currentChatType === 'private') {
                if (!usernameInput.value.trim() || !recipientInput.value.trim()) {
                    alert("Введите своё имя и имя получателя для личного чата");
                    return;
                }
                const chatId = getChatId(usernameInput.value, recipientInput.value);
                path = `privateChats/${chatId}/messages`;
                currentRecipient = recipientInput.value.trim();
            }

            currentChatRef = ref(db, path);
            addWelcomeMessage(currentChatType === 'private');

            currentUnsubscribe = onChildAdded(currentChatRef, addMessage);
        }

        function sendMessage() {
            const name = usernameInput.value.trim() || 'Гость';
            const text = messageInput.value.trim();
            if (!text) return;

            let targetPath = currentChatType === 'general' ? 'messages' : null;

            if (currentChatType === 'private') {
                if (!recipientInput.value.trim()) {
                    alert("Введите имя получателя");
                    return;
                }
                const chatId = getChatId(name, recipientInput.value);
                targetPath = `privateChats/${chatId}/messages`;
            }

            push(ref(db, targetPath), { name, text, time: Date.now() });
            messageInput.value = '';
        }

        // Переключение чатов
        btnGeneral.addEventListener('click', () => {
            currentChatType = 'general';
            btnGeneral.classList.add('active');
            btnPrivate.classList.remove('active');
            recipientInput.style.display = 'none';
            loadChat();
        });

        btnPrivate.addEventListener('click', () => {
            currentChatType = 'private';
            btnGeneral.classList.remove('active');
            btnPrivate.classList.add('active');
            recipientInput.style.display = 'block';
            loadChat();
        });

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        // Запуск
        window.addEventListener('load', () => {
            usernameInput.focus();
            loadChat();
            console.log("✅ FChat запущен (исправленная версия)");
        });
    </script>
</body>
</html>
