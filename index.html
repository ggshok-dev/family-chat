<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FChat — Семейный чат</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    <style>
        :root {
            --bg: #0a0f1c;
            --header: #1b4332;
            --chat-bg: #0f1626;
            --incoming: #1e3a5f;
            --outgoing: #2d6a4f;
            --accent: #40916c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: #e0e1dd; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden;
        }

        header { 
            background: var(--header); 
            padding: 16px; 
            text-align: center; 
            font-size: clamp(1.3rem, 4.5vw, 1.7rem); 
            font-weight: 700; 
        }

        .chat-tabs { display: flex; background: #1b263b; padding: 8px; gap: 10px; }
        .chat-tabs button {
            flex: 1; padding: 12px; border: none; border-radius: 9999px;
            background: transparent; color: #aaa; font-weight: 600; cursor: pointer;
        }
        .chat-tabs button.active { background: var(--accent); color: white; }

        #chat-window { 
            flex: 1; overflow-y: auto; padding: 20px 16px; 
            display: flex; flex-direction: column; gap: 14px;
            background: var(--chat-bg);
        }

        .message { 
            max-width: 82%; padding: 13px 17px; border-radius: 22px; 
            font-size: clamp(0.97rem, 3.6vw, 1.07rem); line-height: 1.5;
            position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.35);
        }
        .incoming { background: var(--incoming); align-self: flex-start; border-bottom-left-radius: 6px; }
        .outgoing { background: var(--outgoing); align-self: flex-end; border-bottom-right-radius: 6px; }

        .user-name { font-size: 0.8rem; opacity: 0.9; margin-bottom: 5px; font-weight: 600; cursor: pointer; }
        .message-text { word-break: break-word; }
        .message img { max-width: 100%; border-radius: 14px; margin: 8px 0 4px; display: block; }

        .actions { 
            position: absolute; top: 10px; right: 12px; display: none; gap: 6px; 
            background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 9999px;
        }
        .outgoing:hover .actions { display: flex; }

        .action-btn { background: none; border: none; color: #ddd; font-size: 1.25rem; cursor: pointer; }

        .input-area { background: #1b263b; padding: 14px 16px 20px; box-shadow: 0 -4px 15px rgba(0,0,0,0.5); }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }

        input { 
            flex: 1; padding: 15px 18px; border-radius: 9999px; border: none; 
            background: #0f1626; color: white; font-size: 1.02rem;
        }
        #username { width: 130px; flex: none; }

        button, .input-btn { 
            background: var(--accent); color: white; border: none; 
            padding: 14px 20px; border-radius: 9999px; cursor: pointer; font-weight: 700;
        }
        .input-btn { padding: 14px; font-size: 1.35rem; min-width: 48px; }

        emoji-picker {
            position: fixed; bottom: 90px; right: 20px; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); border-radius: 18px;
            display: none; width: 320px; height: 380px;
        }

        .welcome { align-self: center; background: #2d6a4f !important; text-align: center; padding: 18px !important; border-radius: 20px; max-width: 85%; }
    </style>
</head>
<body>
    <header>FChat — Семейный чат</header>
    
    <div class="chat-tabs">
        <button id="btn-general" class="active">Общий чат</button>
        <button id="btn-private">Личный чат</button>
    </div>

    <div id="chat-window"></div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="username" placeholder="Ваше имя">
            <input type="text" id="recipient" list="recipients" placeholder="Имя получателя" style="display: none;">
            <datalist id="recipients"></datalist>
        </div>
        <div class="input-row">
            <input type="text" id="message-input" placeholder="Сообщение...">
            <button class="input-btn" id="emoji-btn" title="Эмодзи">😊</button>
            <button class="input-btn" id="photo-btn" title="Отправить фото">📷</button>
            <button id="send-btn">Отправить</button>
        </div>
    </div>

    <emoji-picker></emoji-picker>
    <input type="file" id="file-input" accept="image/*" style="display: none;">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGqZPNEL2eihYYxr0ZJoE-Tedg1cO5cVo",
            authDomain: "fchat-d6879.firebaseapp.com",
            databaseURL: "https://fchat-d6879-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fchat-d6879",
            storageBucket: "fchat-d6879.firebasestorage.app",
            messagingSenderId: "1049514912319",
            appId: "1:1049514912319:web:2ec9ca065eca5ac5da668a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);

        const chatWindow = document.getElementById('chat-window');
        const usernameInput = document.getElementById('username');
        const recipientInput = document.getElementById('recipient');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const emojiBtn = document.getElementById('emoji-btn');
        const photoBtn = document.getElementById('photo-btn');
        const fileInput = document.getElementById('file-input');
        const picker = document.querySelector('emoji-picker');
        const btnGeneral = document.getElementById('btn-general');
        const btnPrivate = document.getElementById('btn-private');

        let currentChatType = 'general';
        let currentRecipient = '';
        let currentChatRef = null;
        let currentUnsubscribe = null;
        let recentRecipients = JSON.parse(localStorage.getItem('recentRecipients') || '[]');

        const notificationSound = new Audio('https://assets.mixkit.co/sfx/preview/296/296-preview.mp3');

        function saveRecentRecipient(name) {
            if (!name) return;
            recentRecipients = recentRecipients.filter(n => n.toLowerCase() !== name.toLowerCase());
            recentRecipients.unshift(name);
            if (recentRecipients.length > 8) recentRecipients.pop();
            localStorage.setItem('recentRecipients', JSON.stringify(recentRecipients));
            updateDatalist();
        }

        function updateDatalist() {
            const dl = document.getElementById('recipients');
            dl.innerHTML = '';
            recentRecipients.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                dl.appendChild(opt);
            });
        }

        function getChatId(user1, user2) {
            const u1 = (user1 || '').trim().toLowerCase();
            const u2 = (user2 || '').trim().toLowerCase();
            return u1 < u2 ? `\( {u1}_ \){u2}` : `\( {u2}_ \){u1}`;
        }

        function formatTime(ts) {
            const d = new Date(ts);
            const now = new Date();
            const isToday = d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
            if (isToday) return d.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
            return d.toLocaleString('ru-RU', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
        }

        function scrollToBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }
        function clearChat() { chatWindow.innerHTML = ''; }

        function addWelcomeMessage(isPrivate) {
            const text = isPrivate ? `👋 Личный чат с <strong>${currentRecipient}</strong>` : `👋 Общий чат`;
            chatWindow.innerHTML += `<div class="message welcome">${text}</div>`;
            scrollToBottom();
        }

        function addMessage(snapshot) {
            const msg = snapshot.val();
            if (!msg) return;

            const myName = usernameInput.value.trim() || 'Гость';
            const isMy = msg.name === myName;

            let content = msg.imageUrl 
                ? `<img src="${msg.imageUrl}" alt="Фото">` 
                : `<div class="message-text">${msg.text || ''}</div>`;

            const html = `
                <div class="message \( {isMy ? 'outgoing' : 'incoming'}" data-key=" \){snapshot.key}">
                    <div class="user-name" data-recipient="\( {msg.name || ''}"> \){msg.name || 'Аноним'}</div>
                    ${content}
                    <div class="message-time">${formatTime(msg.time || Date.now())}</div>
                    ${isMy ? `
                    <div class="actions">
                        <button class="action-btn delete-btn" title="Удалить">🗑️</button>
                    </div>` : ''}
                </div>`;

            chatWindow.innerHTML += html;
            scrollToBottom();

            const newMsg = chatWindow.lastElementChild;
            if (isMy) {
                newMsg.querySelector('.delete-btn').addEventListener('click', () => deleteMessage(snapshot.key));
            }

            // Клик по имени → личный чат
            newMsg.querySelector('.user-name').addEventListener('click', (e) => {
                const rec = e.target.dataset.recipient;
                if (currentChatType === 'general' && rec && rec !== myName) openPrivateChat(rec);
            });

            if (!isMy) {
                notificationSound.currentTime = 0;
                notificationSound.play().catch(() => {});
            }
        }

        function openPrivateChat(recipient) {
            currentChatType = 'private';
            btnGeneral.classList.remove('active');
            btnPrivate.classList.add('active');
            recipientInput.style.display = 'block';
            recipientInput.value = recipient;
            loadChat();
        }

        function deleteMessage(key) {
            if (!confirm("Удалить это сообщение?")) return;
            let path = currentChatType === 'general' ? 'messages' : `privateChats/${getChatId(usernameInput.value, currentRecipient)}/messages`;
            remove(ref(db, `\( {path}/ \){key}`));
            loadChat();
        }

        async function sendPhoto(file) {
            const name = usernameInput.value.trim() || 'Гость';
            if (!file) return;

            const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const fileRef = storageRef(storage, `chat-images/\( {Date.now()}_ \){safeName}`);

            try {
                await uploadBytes(fileRef, file);
                const imageUrl = await getDownloadURL(fileRef);

                let targetPath = currentChatType === 'general' ? 'messages' : null;
                if (currentChatType === 'private') {
                    const rec = recipientInput.value.trim();
                    if (!rec) return alert("Укажите получателя");
                    currentRecipient = rec;
                    saveRecentRecipient(rec);
                    const chatId = getChatId(name, rec);
                    targetPath = `privateChats/${chatId}/messages`;
                }

                push(ref(db, targetPath), {
                    name: name,
                    imageUrl: imageUrl,
                    time: Date.now()
                });
                console.log("✅ Фото отправлено успешно");
            } catch (error) {
                console.error("Ошибка при отправке фото:", error);
                alert("Ошибка отправки фото.\n\nПроверь настройки CORS и правила Storage в Firebase Console.");
            }
        }

        function sendMessage() {
            const name = usernameInput.value.trim() || 'Гость';
            const text = messageInput.value.trim();
            if (!text) return;

            let targetPath = currentChatType === 'general' ? 'messages' : null;
            if (currentChatType === 'private') {
                const rec = recipientInput.value.trim();
                if (!rec) return alert("Укажите получателя");
                currentRecipient = rec;
                saveRecentRecipient(rec);
                const chatId = getChatId(name, rec);
                targetPath = `privateChats/${chatId}/messages`;
            }

            push(ref(db, targetPath), { name, text, time: Date.now() });
            messageInput.value = '';
        }

        // Переключение чатов
        btnGeneral.addEventListener('click', () => {
            currentChatType = 'general';
            btnGeneral.classList.add('active');
            btnPrivate.classList.remove('active');
            recipientInput.style.display = 'none';
            loadChat();
        });

        btnPrivate.addEventListener('click', () => {
            currentChatType = 'private';
            btnGeneral.classList.remove('active');
            btnPrivate.classList.add('active');
            recipientInput.style.display = 'block';
            updateDatalist();
            loadChat();
        });

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        emojiBtn.addEventListener('click', () => {
            picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
        });

        picker.addEventListener('emoji-click', e => {
            messageInput.value += e.detail.unicode;
            messageInput.focus();
            picker.style.display = 'none';
        });

        photoBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => {
            if (e.target.files[0]) sendPhoto(e.target.files[0]);
        });

        function loadChat() {
            clearChat();
            if (currentUnsubscribe) currentUnsubscribe();

            let path = currentChatType === 'general' ? 'messages' : null;
            if (currentChatType === 'private') {
                if (!usernameInput.value.trim() || !recipientInput.value.trim()) {
                    alert("Введите своё имя и имя получателя");
                    return;
                }
                currentRecipient = recipientInput.value.trim();
                saveRecentRecipient(currentRecipient);
                const chatId = getChatId(usernameInput.value, currentRecipient);
                path = `privateChats/${chatId}/messages`;
            }

            currentChatRef = ref(db, path);
            addWelcomeMessage(currentChatType === 'private');
            currentUnsubscribe = onChildAdded(currentChatRef, addMessage);
        }

        window.addEventListener('load', () => {
            updateDatalist();
            usernameInput.focus();
            loadChat();
            console.log("✅ FChat запущен (исправленная версия)");
        });
    </script>
</body>
</html>
