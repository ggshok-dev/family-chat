<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FChat — Семейный мессенджер</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <style>
    :root { --font-size-multiplier: 1; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
      font-size: calc(1rem * var(--font-size-multiplier));
    }
    
    .secret-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); display: flex; justify-content: center;
      align-items: center; z-index: 9999; backdrop-filter: blur(10px);
    }
    
    .secret-dialog {
      background: white; padding: 30px; border-radius: 20px;
      text-align: center; max-width: 350px; width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .secret-dialog h2 { color: #333; margin-bottom: 10px; }
    .secret-dialog .icon { font-size: 50px; margin-bottom: 15px; }
    .secret-dialog p { color: #666; margin-bottom: 20px; font-size: 0.9rem; }
    
    .secret-input {
      width: 100%; padding: 12px; border: 2px solid #e0e0e0;
      border-radius: 12px; font-size: 1.1rem; text-align: center;
      margin-bottom: 15px; outline: none; letter-spacing: 3px;
    }
    
    .secret-input:focus { border-color: #667eea; }
    
    .secret-btn {
      width: 100%; padding: 12px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2); color: white;
      font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    
    .secret-btn:hover { transform: scale(1.02); }
    
    .error-msg { color: #ff4444; font-size: 0.85rem; margin-top: 10px; display: none; }
    .error-msg.show { display: block; }
    
    .app {
      width: 100%; max-width: 450px; height: 95vh; background: white;
      border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex; flex-direction: column; overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; padding: 15px 20px; display: flex;
      align-items: center; gap: 10px;
    }
    
    .header-logo { font-size: 28px; }
    .header-title { font-size: 1.3rem; font-weight: 700; flex: 1; }
    
    .header-actions { display: flex; gap: 8px; }
    
    .header-btn {
      background: rgba(255,255,255,0.2); border: none; color: white;
      width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: 0.2s;
    }
    
    .header-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
    
    .users-avatars {
      display: flex; justify-content: center; gap: 15px; padding: 15px;
      background: #f8f9fa; border-bottom: 1px solid #eee; overflow-x: auto;
    }
    
    .user-avatar {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer; transition: 0.2s; min-width: 60px;
    }
    
    .user-avatar:hover { transform: translateY(-3px); }
    
    .avatar-circle {
      width: 50px; height: 50px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 24px;
      border: 3px solid transparent; background: #e0e0e0;
      overflow: hidden; transition: 0.2s;
    }
    
    .avatar-circle img {
      width: 100%; height: 100%; object-fit: cover; position: absolute;
    }
    
    .user-avatar.active .avatar-circle {
      border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
    }
    
    .avatar-name { font-size: 0.75rem; font-weight: 600; color: #666; }
    .user-avatar.active .avatar-name { color: #667eea; }
    
    .settings-panel {
      display: none; background: white; border-bottom: 1px solid #eee;
      padding: 12px 15px; color: #333; max-height: 60vh; overflow-y: auto;
    }
    
    .settings-panel.show { display: block; }
    .settings-panel h3 { font-size: 1rem; margin-bottom: 10px; color: #667eea; }
    
    .setting-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #f0f0f0;
    }
    
    .setting-item:last-child { border-bottom: none; }
    .setting-label { font-size: 0.9rem; }
    
    .toggle-switch { position: relative; width: 50px; height: 26px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    
    .toggle-slider {
      position: absolute; cursor: pointer; top: 0; left: 0;
      right: 0; bottom: 0; background-color: #ccc; transition: .4s;
      border-radius: 34px;
    }
    
    .toggle-slider:before {
      position: absolute; content: ""; height: 20px; width: 20px;
      left: 3px; bottom: 3px; background-color: white; transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .toggle-slider { background-color: #667eea; }
    input:checked + .toggle-slider:before { transform: translateX(24px); }
    
    .tabs { display: flex; padding: 8px 15px; gap: 8px; background: white; border-bottom: 1px solid #eee; }
    
    .tab {
      flex: 1; padding: 8px; border: none; background: #f0f0f0;
      border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
    }
    
    .tab.active { background: #667eea; color: white; }
    
    .private-selector {
      display: none; padding: 8px 15px; background: white; border-bottom: 1px solid #eee;
    }
    
    .private-selector select { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #ddd; }
    
    .chat-window {
      flex: 1; overflow-y: auto; padding: 15px; background: #f5f5f5;
      display: flex; flex-direction: column; gap: 8px;
    }
    
    .empty-chat { text-align: center; color: #999; margin-top: 40px; }
    .empty-icon { font-size: 50px; margin-bottom: 10px; }
    
    .message { max-width: 80%; animation: slideIn 0.3s; }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.sent { align-self: flex-end; }
    .message.received { align-self: flex-start; }
    
    .bubble {
      padding: 10px 14px; border-radius: 18px; line-height: 1.4;
      word-wrap: break-word; font-size: 0.95rem;
    }
    
    .sent .bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border-bottom-right-radius: 4px;
    }
    
    .received .bubble {
      background: white; border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px; color: #333;
    }
    
    .msg-sender {
      font-size: 0.75rem; font-weight: 600; color: #764ba2;
      margin-bottom: 2px; display: flex; align-items: center; gap: 5px;
    }
    
    .sender-avatar {
      width: 20px; height: 20px; border-radius: 50%; overflow: hidden;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px; background: #e0e0e0;
    }
    
    .sender-avatar img { width: 100%; height: 100%; object-fit: cover; }
    
    .msg-time {
      font-size: 0.7rem; color: #999; margin-top: 4px; text-align: right;
      display: flex; justify-content: space-between; align-items: center;
    }
    
    .sent .msg-time { color: rgba(255,255,255,0.8); }
    
    .msg-menu-btn {
      cursor: pointer; opacity: 0.5; padding: 2px 6px; border-radius: 4px;
    }
    
    .msg-menu-btn:hover { opacity: 1; background: rgba(0,0,0,0.1); }
    
    .media-img {
      max-width: 200px; max-height: 200px; border-radius: 10px;
      cursor: pointer; margin: 5px 0;
    }
    
    .media-audio { margin: 5px 0; max-width: 200px; }
    
    .emoji-picker-wrapper {
      display: none; margin-bottom: 10px; border: 1px solid #ddd;
      border-radius: 10px; background: white; max-height: 300px;
      overflow-y: auto; padding: 10px;
    }
    
    .emoji-picker-wrapper.show { display: block; }
    
    .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
    
    .emoji-item {
      font-size: 1.5rem; padding: 5px; cursor: pointer; text-align: center;
      border-radius: 8px; border: none; background: none; transition: 0.2s;
    }
    
    .emoji-item:hover { background: #f0f0f0; transform: scale(1.2); }
    
    .input-panel { padding: 12px 15px; background: white; border-top: 1px solid #eee; }
    
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    
    .icon-btn {
      width: 38px; height: 38px; border: none; background: #f0f0f0;
      border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: 0.2s;
    }
    
    .icon-btn:hover { background: #e0e0e0; }
    
    .icon-btn.recording { background: #ff4444; color: white; animation: pulse 1.5s infinite; }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(255,68,68,0); }
    }
    
    .msg-input {
      flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px;
      font-size: 0.95rem; resize: none; max-height: 100px; font-family: inherit;
      outline: none; color: #333;
    }
    
    .msg-input:focus { border-color: #667eea; }
    
    .send-btn {
      width: 38px; height: 38px; border: none; background: #667eea;
      color: white; border-radius: 50%; font-size: 1.2rem; cursor: pointer;
    }
    
    .send-btn:hover { background: #764ba2; }
    
    .context-menu {
      position: fixed; background: white; border-radius: 10px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 1000;
      overflow: hidden; animation: fadeIn 0.2s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .context-menu button {
      display: block; width: 100%; padding: 10px 15px; border: none;
      background: none; text-align: left; cursor: pointer; font-size: 0.9rem;
    }
    
    .context-menu button:hover { background: #f5f5f5; }
    .danger-btn { color: #ff4444; }
    
    .font-size-controls { display: flex; gap: 8px; align-items: center; }
    
    .font-size-btn {
      width: 30px; height: 30px; border: 2px solid #667eea;
      background: white; color: #667eea; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    
    .font-size-btn:hover { background: #667eea; color: white; }
    .font-size-value { font-weight: 600; min-width: 40px; text-align: center; }
    
    .action-btn {
      padding: 6px 14px; border: none; border-radius: 8px; cursor: pointer;
      font-size: 0.85rem; font-weight: 500; transition: 0.2s;
    }
    
    .action-btn.primary { background: #667eea; color: white; }
    .action-btn.danger { background: #ff4444; color: white; }
    .action-btn.warning { background: #ff9800; color: white; }
    .action-btn:hover { transform: scale(1.05); }
    
    @media (max-width: 480px) {
      .app { height: 100vh; border-radius: 0; }
      body { padding: 0; }
    }
  </style>
</head>
<body>
  <!-- Секретный код -->

  <!-- Приложение (изначально скрыто) -->
  <div class="app" id="mainApp" style="display:none;">

      <div class="setting-item">

      <div class="setting-item">

      <div class="setting-item">
        <span class="setting-label">🗑️ Очистить чат</span>
        <button class="action-btn danger" id="clearBtn">Удалить всё</button>
      </div>
    </div>

    <div class="users-avatars" id="usersAvatars"></div>

    <div class="tabs">
      <button class="tab active" data-tab="general">💬 Общий</button>
      <button class="tab" data-tab="private">🔒 Личный</button>
    </div>

    <div class="private-selector" id="privateSel">
      <select id="privateRecipient">
        <option value="">Выберите...</option>
      </select>
    </div>

    <div class="chat-window" id="chatWindow">
      <div class="empty-chat">
        <div class="empty-icon">💬</div>
        <p>Нет сообщений</p>
      </div>
    </div>

    <div class="input-panel">
      <div class="emoji-picker-wrapper" id="emojiPicker">
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
      <div class="input-row">
        <button class="icon-btn" id="emojiBtn">😊</button>
        <button class="icon-btn" id="micBtn">🎤</button>
        <button class="icon-btn" id="attachBtn">📎</button>
        <textarea class="msg-input" id="msgInput" rows="1" placeholder="Сообщение..."></textarea>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <input type="file" id="avatarInput" accept="image/*" style="display:none">

  <script>

        katya: { id: 'katya', name: 'Катя', emoji: '👧', color: '#9C27B0' }

      const EMOJIS = '😀😂🤣😃😄😅😆😉😊😋😎😍🥰😘😗😙😚🙂🤗🤩🤔🤨😐😑😶🙄😏😣😥😮🤐😯😪😫😴😌😛😜😝🤤😒😓😔😕🙃🤑😲☹️🙁😖😞😟😤😢😭😦😧😨😩🤯😬😰😱🥵🥶😳🤪😵😡😠🤬😷🤒🤕🤢🤮😇🤠🤡🥳🥴🥺🤥🤫🤭🧐🤓😈👿👹👺💀👻👽🤖💩❤️🧡💛💚💙💜🖤🤍🤎💔❣️💕💞💓💗💖👍👎👏🙌🤝💪✌️🤞👌🤏✋👋🤚🖐️✍️🙏👨‍👩‍👧‍👦🏠🎉🎂🍕🍔🌮🍩☕🍰🎄🎁🎈⭐🌟🔥';

      // ============ СЕКРЕТНЫЙ КОД ============
      function checkCode() {
        const input = document.getElementById('secretInput').value;
        const error = document.getElementById('errorMsg');
        
        if (input === secretCode) {
          document.getElementById('secretOverlay').style.display = 'none';
          document.getElementById('mainApp').style.display = 'flex';

      }
      
      document.getElementById('secretBtn').addEventListener('click', checkCode);

        if (e.key === 'Enter') checkCode();
      });
      document.getElementById('secretInput').focus();
      
      // ============ ПОМОЩНИКИ ============
      function getAvatar(userId) {
        return localStorage.getItem('fc_av_' + userId) || null;
      }
      
      function saveAvatar(userId, url) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const size = Math.min(img.width, img.height, 200);
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          const sx = (img.width - size) / 2;
          const sy = (img.height - size) / 2;
          ctx.drawImage(img, sx, sy, size, size, 0, 0, size, size);
          localStorage.setItem('fc_av_' + userId, canvas.toDataURL('image/jpeg', 0.6));
          renderUsers();
        };
        img.src = url;
      }
      
      function getChatPath() {
        if (activeTab === 'private' && privateWith) {
          const users = [currentUser, privateWith].sort();
          return 'private/' + users[0] + '_' + users[1];
        }
        return 'general';
      }
      
      function compressImage(dataUrl, maxW) {
        return new Promise(function(resolve) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxW) { h = (h * maxW) / w; w = maxW; }
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.src = dataUrl;
        });
      }

          const isActive = m.id === currentUser;
          return `
            <div class="user-avatar ${isActive ? 'active' : ''}" data-user="${m.id}">
              <div class="avatar-circle" style="background:${av ? 'transparent' : m.color + '20'};">
                ${av ? '<img src="' + av + '" alt="' + m.name + '">' : '<span>' + m.emoji + '</span>'}
              </div>
              <span class="avatar-name">${m.name}</span>
            </div>
          `;
        }).join('');
        
        container.querySelectorAll('.user-avatar').forEach(function(av) {
          av.addEventListener('click', function() {
            switchUser(av.dataset.user);
          });
        });
      }
      
      function renderEmoji() {
        const grid = document.getElementById('emojiGrid');
        const emojis = [...EMOJIS];
        grid.innerHTML = emojis.map(function(e) {
          return '<button class="emoji-item">' + e + '</button>';
        }).join('');
        
        grid.querySelectorAll('.emoji-item').forEach(function(btn) {
          btn.addEventListener('click', function() {
            document.getElementById('msgInput').value += btn.textContent;
            document.getElementById('msgInput').focus();
          });
        });
      }
      
      function showMessage(msg) {
        if (processedIds.has(msg.id)) return;
        processedIds.add(msg.id);
        
        const chat = document.getElementById('chatWindow');
        const empty = chat.querySelector('.empty-chat');
        if (empty) empty.remove();
        
        const isSent = msg.from === currentUser;
        const sender = FAMILY[msg.from] || { name: 'Кто-то', emoji: '👤' };
        const senderAv = getAvatar(msg.from);
        
        const div = document.createElement('div');
        div.className = 'message ' + (isSent ? 'sent' : 'received');
        div.dataset.id = msg.id;
        
        let content = '';
        if (msg.type === 'image') {
          content = '<img src="' + msg.data + '" class="media-img" alt="Фото">';
        } else if (msg.type === 'voice') {
          content = '<audio controls class="media-audio" src="' + msg.data + '"></audio>';
        } else {
          content = msg.text || '';
        }
        
        const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
        
        div.innerHTML = 
          (!isSent ? '<div class="msg-sender"><span class="sender-avatar">' + 
            (senderAv ? '<img src="' + senderAv + '">' : sender.emoji) + 
            '</span>' + sender.name + '</div>' : '') +
          '<div class="bubble">' + content + 
            '<div class="msg-time"><span>' + time + '</span>' + 
            (isSent ? '<span class="msg-menu-btn">⋮</span>' : '') + 
            '</div>' +
          '</div>';
        
        if (isSent) {
          div.querySelector('.msg-menu-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            showMenu(e, msg);
          });
        }
        
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
      }
      
      function showMenu(event, msg) {
        const old = document.querySelector('.context-menu');
        if (old) old.remove();
        
        const menu = document.createElement('div');
        menu.className = 'context-menu';
        menu.innerHTML = '<button>✏️ Редактировать</button><button class="danger-btn">🗑️ Удалить</button>';
        menu.style.left = Math.min(event.clientX, window.innerWidth - 150) + 'px';
        menu.style.top = event.clientY + 'px';
        document.body.appendChild(menu);
        
        menu.querySelectorAll('button')[0].addEventListener('click', function() {
          menu.remove();
          const text = prompt('Новый текст:', msg.text || '');
          if (text && text !== msg.text) {
            db.ref(getChatPath() + '/' + msg.id).update({text: text, edited: true});
          }
        });
        
        menu.querySelectorAll('button')[1].addEventListener('click', function() {
          menu.remove();
          if (confirm('Удалить?')) {
            db.ref(getChatPath() + '/' + msg.id).remove();
            processedIds.delete(msg.id);
          }
        });
        
        setTimeout(function() {
          document.addEventListener('click', function close() {
            menu.remove();
            document.removeEventListener('click', close);
          });
        }, 0);
      }
      
      // ============ СООБЩЕНИЯ ============
      function loadMessages() {
        if (messageListener) {
          db.ref(getChatPath()).off('child_added', messageListener);
        }
        
        const ref = db.ref(getChatPath());
        document.getElementById('chatWindow').innerHTML = '<div class="empty-chat"><div class="empty-icon">💬</div><p>Загрузка...</p></div>';
        processedIds.clear();
        
        ref.once('value', function(snap) {
          const msgs = snap.val();
          document.getElementById('chatWindow').innerHTML = '';
          
          if (!msgs) {
            document.getElementById('chatWindow').innerHTML = '<div class="empty-chat"><div class="empty-icon">💬</div><p>Нет сообщений</p></div>';
            return;
          }
          
          const sorted = Object.entries(msgs)
            .map(function(e) { return Object.assign({id: e[0]}, e[1]); })
            .sort(function(a, b) { return (a.timestamp || 0) - (b.timestamp || 0); });
          
          sorted.forEach(function(msg) { showMessage(msg); });
        });
        
        messageListener = ref.on('child_added', function(snap) {
          const msg = Object.assign({id: snap.key}, snap.val());
          if (!processedIds.has(msg.id)) {
            showMessage(msg);
            if (msg.from !== currentUser) {
              const sender = FAMILY[msg.from] || {name: 'Кто-то'};
              notify(sender.emoji + ' ' + sender.name, msg.text || 'Новое сообщение');
            }
          }
        });
        
        ref.on('child_changed', function(snap) {
          const msg = Object.assign({id: snap.key}, snap.val());
          const old = document.querySelector('[data-id="' + msg.id + '"]');
          if (old) old.remove();
          processedIds.delete(msg.id);
          showMessage(msg);
        });
        
        ref.on('child_removed', function(snap) {
          const el = document.querySelector('[data-id="' + snap.key + '"]');
          if (el) el.remove();
          processedIds.delete(snap.key);
        });
      }
      
      // ============ УВЕДОМЛЕНИЯ ============
      function notify(title, body) {
        if (!notifEnabled) return;
        if (document.visibilityState === 'visible') {
          playSound();
          return;
        }
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification(title, {body: body, icon: '👨‍👩‍👧‍👦', tag: 'fc'});
        }
        playSound();
      }
      
      function playSound() {
        if (!soundEnabled) return;
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 800;
          gain.gain.value = 0.1;
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
          osc.stop(ctx.currentTime + 0.3);
        } catch(e) {}
      }
      
      function requestNotif() {
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
      }
      
      // ============ ОТПРАВКА ============
      function sendText(text) {
        if (!text.trim()) return;
        const msg = {
          from: currentUser,
          text: text.trim(),
          timestamp: firebase.database.ServerValue.TIMESTAMP,
          type: 'text'
        };
        if (autoDeleteHours > 0) msg.deleteAt = Date.now() + autoDeleteHours * 3600000;
        db.ref(getChatPath()).push(msg);
        document.getElementById('msgInput').value = '';
      }
      
      async function sendMedia(type, dataUrl) {
        let final = dataUrl;
        if (type === 'image') final = await compressImage(dataUrl, 1200);
        const msg = {
          from: currentUser,
          type: type,
          data: final,
          timestamp: firebase.database.ServerValue.TIMESTAMP,
          text: type === 'image' ? '📷 Фото' : '🎤 Голосовое'
        };
        if (autoDeleteHours > 0) msg.deleteAt = Date.now() + autoDeleteHours * 3600000;
        db.ref(getChatPath()).push(msg);
      }
      
      // ============ ПОЛЬЗОВАТЕЛИ ============
      function switchUser(userId) {
        if (userId === currentUser) return;
        const pin = localStorage.getItem('fc_pin_' + userId);
        if (pin) {
          const entered = prompt('ПИН для ' + FAMILY[userId].name + ':');
          if (entered !== pin) { alert('Неверно'); return; }
        } else {
          const p = prompt('Придумайте 4-значный ПИН для ' + FAMILY[userId].name + ':');
          if (!p || p.length !== 4) return;
          localStorage.setItem('fc_pin_' + userId, p);
        }
        currentUser = userId;
        localStorage.setItem('fc_user', userId);
        renderUsers();
        updatePrivate();
        loadMessages();
      }
      
      function updatePrivate() {
        const sel = document.getElementById('privateRecipient');
        const others = Object.values(FAMILY).filter(function(m) { return m.id !== currentUser; });
        sel.innerHTML = '<option value="">Выберите...</option>' +
          others.map(function(m) { return '<option value="' + m.id + '">' + m.emoji + ' ' + m.name + '</option>'; }).join('');
      }
      
      // ============ НАСТРОЙКИ ============
      function applyFont() {
        document.documentElement.style.setProperty('--font-size-multiplier', fontSize / 100);
        document.getElementById('fontValue').textContent = fontSize + '%';
      }
      
      function loadSettings() {
        if (localStorage.getItem('fc_theme') === 'dark') {
          document.body.classList.add('dark-theme');
          document.getElementById('themeBtn').textContent = '☀️';
        }
        document.getElementById('notifToggle').checked = notifEnabled;
        document.getElementById('notifBtn').textContent = notifEnabled ? '🔔' : '🔕';
        document.getElementById('soundToggle').checked = soundEnabled;
        document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
        document.getElementById('autoDelete').value = autoDeleteHours;
        applyFont();
      }
      
      // ============ ОБРАБОТЧИКИ ============
      function setupListeners() {
        document.getElementById('sendBtn').addEventListener('click', function() {
          sendText(document.getElementById('msgInput').value);
        });
        
        document.getElementById('msgInput').addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendText(this.value);
          }
        });
        
        document.getElementById('emojiBtn').addEventListener('click', function() {
          document.getElementById('emojiPicker').classList.toggle('show');
        });
        
        document.addEventListener('click', function(e) {
          const pk = document.getElementById('emojiPicker');
          const eb = document.getElementById('emojiBtn');
          if (!pk.contains(e.target) && e.target !== eb) {
            pk.classList.remove('show');
          }
        });
        
        document.getElementById('attachBtn').addEventListener('click', function() {
          document.getElementById('fileInput').click();
        });
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
          const file = e.target.files[0];
          if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = function(ev) { sendMedia('image', ev.target.result); };
            reader.readAsDataURL(file);
          }
          e.target.value = '';
        });
        
        document.getElementById('avatarBtn').addEventListener('click', function() {
          document.getElementById('avatarInput').click();
        });
        
        document.getElementById('avatarInput').addEventListener('change', function(e) {
          const file = e.target.files[0];
          if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = function(ev) { saveAvatar(currentUser, ev.target.result); };
            reader.readAsDataURL(file);
          }
          e.target.value = '';
        });
        
        document.getElementById('micBtn').addEventListener('click', function() {
          const btn = document.getElementById('micBtn');
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            btn.classList.remove('recording');
            btn.textContent = '🎤';
            return;
          }
          navigator.mediaDevices.getUserMedia({audio: true}).then(function(stream) {
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = function(e) { audioChunks.push(e.data); };
            mediaRecorder.onstop = function() {
              const blob = new Blob(audioChunks, {type: 'audio/webm'});
              const reader = new FileReader();
              reader.onload = function(ev) { sendMedia('voice', ev.target.result); };
              reader.readAsDataURL(blob);
              stream.getTracks().forEach(function(t) { t.stop(); });
            };
            mediaRecorder.start();
            btn.classList.add('recording');
            btn.textContent = '⏹️';
            setTimeout(function() {
              if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                btn.classList.remove('recording');
                btn.textContent = '🎤';
              }
            }, 10000);
          }).catch(function() { alert('Нет доступа к микрофону'); });
        });
        
        document.querySelectorAll('.tab').forEach(function(tab) {
          tab.addEventListener('click', function() {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            tab.classList.add('active');
            activeTab = tab.dataset.tab;
            document.getElementById('privateSel').style.display = activeTab === 'private' ? 'block' : 'none';
            if (activeTab === 'private') updatePrivate();
            loadMessages();
          });
        });
        
        document.getElementById('privateRecipient').addEventListener('change', function() {
          privateWith = this.value;
          if (privateWith) loadMessages();
        });
        
        document.getElementById('settingsBtn').addEventListener('click', function() {
          document.getElementById('settingsPanel').classList.toggle('show');
        });
        
        document.getElementById('themeBtn').addEventListener('click', function() {
          document.body.classList.toggle('dark-theme');
          const dark = document.body.classList.contains('dark-theme');
          this.textContent = dark ? '☀️' : '🌙';
          localStorage.setItem('fc_theme', dark ? 'dark' : 'light');
        });
        
        document.getElementById('notifToggle').addEventListener('change', function() {
          notifEnabled = this.checked;
          localStorage.setItem('fc_notif', notifEnabled);
          document.getElementById('notifBtn').textContent = notifEnabled ? '🔔' : '🔕';
          if (notifEnabled) requestNotif();
        });
        
        document.getElementById('soundToggle').addEventListener('change', function() {
          soundEnabled = this.checked;
          localStorage.setItem('fc_sound', soundEnabled);
          document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
        });
        
        document.getElementById('autoDelete').addEventListener('change', function() {
          autoDeleteHours = parseInt(this.value);
          localStorage.setItem('fc_autoDelete', autoDeleteHours);
        });
        
        document.getElementById('fontUp').addEventListener('click', function() {
          if (fontSize < 150) { fontSize += 10; localStorage.setItem('fc_font', fontSize); applyFont(); }
        });
        
        document.getElementById('fontDown').addEventListener('click', function() {
          if (fontSize > 80) { fontSize -= 10; localStorage.setItem('fc_font', fontSize); applyFont(); }
        });
        
        document.getElementById('changeCodeBtn').addEventListener('click', function() {
          const old = prompt('Текущий код:');
          if (old !== secretCode) { alert('Неверно'); return; }
          const newCode = prompt('Новый код:');
          if (newCode && newCode.length >= 4) {
            secretCode = newCode;
            localStorage.setItem('fc_code', secretCode);
            alert('✅ Готово!');
          }
        });
        
        document.getElementById('cacheBtn').addEventListener('click', function() {
          if (confirm('Перезагрузить страницу?')) location.reload();
        });
        
        document.getElementById('clearBtn').addEventListener('click', function() {
          if (confirm('Удалить все сообщения?')) {
            db.ref(getChatPath()).remove();
            processedIds.clear();
          }
        });
        
        document.addEventListener('visibilitychange', function() {
          // chatVisible = !document.hidden
        });
      }
      
      // ============ АВТОУДАЛЕНИЕ ============
      function startAutoDelete() {
        setInterval(async function() {
          if (autoDeleteHours === 0) return;
          const snap = await db.ref(getChatPath()).once('value');
          const msgs = snap.val();
          if (!msgs) return;
          const now = Date.now();
          const updates = {};
          for (const [id, msg] of Object.entries(msgs)) {
            if (msg.deleteAt && msg.deleteAt <= now) {
              updates[id] = null;
              processedIds.delete(id);
            }
          }
          if (Object.keys(updates).length > 0) {
            await db.ref(getChatPath()).update(updates);
          }
        }, 30000);
      }
      
      // ============ ЗАПУСК ============
      function initApp() {
        renderEmoji();
        renderUsers();
        setupListeners();
        loadSettings();
        loadMessages();
        startAutoDelete();
        requestNotif();
      }
      
      console.log('✅ FChat готов к работе');
    });
  </script>
</body>
