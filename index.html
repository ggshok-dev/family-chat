<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FChat — Семейный мессенджер</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }
    
    .app {
      width: 100%;
      max-width: 450px;
      height: 95vh;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Заголовок */
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header-logo {
      font-size: 28px;
    }
    
    .header-title {
      font-size: 1.3rem;
      font-weight: 700;
      flex: 1;
    }
    
    .theme-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 20px;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Выбор пользователя */
    .users-row {
      display: flex;
      gap: 8px;
      padding: 12px 15px;
      overflow-x: auto;
      border-bottom: 1px solid #eee;
      background: #f8f9fa;
    }
    
    .user-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      white-space: nowrap;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .user-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    
    /* Вкладки чатов */
    .tabs {
      display: flex;
      padding: 8px 15px;
      gap: 8px;
      background: white;
      border-bottom: 1px solid #eee;
    }
    
    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: #f0f0f0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .tab.active {
      background: #667eea;
      color: white;
    }
    
    /* Окно чата */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .empty-chat {
      text-align: center;
      color: #999;
      margin-top: 40px;
    }
    
    .empty-icon {
      font-size: 50px;
      margin-bottom: 10px;
    }
    
    /* Сообщения */
    .message {
      max-width: 80%;
      animation: slideIn 0.3s;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.sent {
      align-self: flex-end;
    }
    
    .message.received {
      align-self: flex-start;
    }
    
    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    
    .sent .bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-bottom-right-radius: 4px;
    }
    
    .received .bubble {
      background: white;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    
    .msg-sender {
      font-size: 0.75rem;
      font-weight: 600;
      color: #764ba2;
      margin-bottom: 2px;
    }
    
    .msg-time {
      font-size: 0.7rem;
      color: #999;
      margin-top: 4px;
      text-align: right;
    }
    
    .sent .msg-time {
      color: rgba(255,255,255,0.8);
    }
    
    .msg-actions {
      cursor: pointer;
      opacity: 0.5;
      margin-left: 8px;
    }
    
    .msg-actions:hover {
      opacity: 1;
    }
    
    /* Медиа */
    .media-img {
      max-width: 200px;
      max-height: 200px;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px 0;
    }
    
    .media-audio {
      margin: 5px 0;
    }
    
    /* Панель ввода */
    .input-panel {
      padding: 12px 15px;
      background: white;
      border-top: 1px solid #eee;
    }
    
    .emoji-picker-container {
      display: none;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
    }
    
    .emoji-picker-container.show {
      display: block;
    }
    
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    
    .icon-btn {
      width: 38px;
      height: 38px;
      border: none;
      background: #f0f0f0;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .icon-btn:hover {
      background: #e0e0e0;
      transform: scale(1.05);
    }
    
    .icon-btn.recording {
      background: #ff4444;
      color: white;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
      50% { box-shadow: 0 0 0 10px rgba(255,68,68,0); }
    }
    
    .msg-input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 10px 15px;
      font-size: 0.95rem;
      resize: none;
      max-height: 100px;
      font-family: inherit;
      outline: none;
    }
    
    .msg-input:focus {
      border-color: #667eea;
    }
    
    .send-btn {
      width: 38px;
      height: 38px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .send-btn:hover {
      background: #764ba2;
      transform: scale(1.05);
    }
    
    /* Контекстное меню */
    .context-menu {
      position: fixed;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 25px rgba(0,0,0,0.2);
      z-index: 1000;
      overflow: hidden;
      animation: fadeIn 0.2s;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .context-menu button {
      display: block;
      width: 100%;
      padding: 10px 15px;
      border: none;
      background: none;
      text-align: left;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    
    .context-menu button:hover {
      background: #f5f5f5;
    }
    
    .danger-btn {
      color: #ff4444;
    }
    
    /* Настройки */
    .settings-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 15px;
      background: #fff;
      border-bottom: 1px solid #eee;
      font-size: 0.85rem;
    }
    
    .settings-bar select {
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }
    
    .clear-chat-btn {
      padding: 4px 12px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    
    /* Тёмная тема */
    body.dark-theme .app {
      background: #1a1a2e;
    }
    
    body.dark-theme .chat-window {
      background: #16213e;
    }
    
    body.dark-theme .bubble.received .bubble {
      background: #1a1a2e;
      border-color: #2a2a4a;
      color: #eee;
    }
    
    body.dark-theme .msg-input {
      background: #1a1a2e;
      color: white;
      border-color: #2a2a4a;
    }
    
    body.dark-theme .input-panel,
    body.dark-theme .tabs,
    body.dark-theme .users-row,
    body.dark-theme .settings-bar {
      background: #16213e;
      border-color: #2a2a4a;
    }
    
    body.dark-theme .user-btn {
      background: #1a1a2e;
      border-color: #2a2a4a;
      color: #eee;
    }
    
    body.dark-theme .tab {
      background: #1a1a2e;
      color: #eee;
    }
    
    body.dark-theme .icon-btn {
      background: #1a1a2e;
      color: #eee;
    }
    
    body.dark-theme .empty-chat {
      color: #888;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <span class="header-logo">👨‍👩‍👧‍👦</span>
      <span class="header-title">FChat</span>
      <button class="theme-btn" id="themeBtn">🌙</button>
    </div>

    <!-- User Selection -->
    <div class="users-row" id="usersRow"></div>

    <!-- Settings -->
    <div class="settings-bar">
      <span>🗑️ Автоудаление:</span>
      <select id="autoDeleteSelect">
        <option value="0">Выключено</option>
        <option value="1">1 час</option>
        <option value="6">6 часов</option>
        <option value="24" selected>24 часа</option>
        <option value="168">7 дней</option>
      </select>
      <button class="clear-chat-btn" id="clearChatBtn">Очистить</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="general">💬 Общий</button>
      <button class="tab" data-tab="private">🔒 Личный</button>
    </div>

    <!-- Private Recipient Selector -->
    <div id="privateSelector" style="display:none; padding: 8px 15px; background: white; border-bottom: 1px solid #eee;">
      <select id="privateRecipient" style="width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #ddd;">
        <option value="">Выберите собеседника...</option>
      </select>
    </div>

    <!-- Chat Window -->
    <div class="chat-window" id="chatWindow">
      <div class="empty-chat">
        <div class="empty-icon">💬</div>
        <p>Выберите чат и начните общение</p>
      </div>
    </div>

    <!-- Input -->
    <div class="input-panel">
      <div class="emoji-picker-container" id="emojiContainer">
        <emoji-picker id="emojiPicker"></emoji-picker>
      </div>
      <div class="input-row">
        <button class="icon-btn" id="emojiBtn">😊</button>
        <button class="icon-btn" id="micBtn">🎤</button>
        <button class="icon-btn" id="attachBtn">📎</button>
        <textarea class="msg-input" id="msgInput" rows="1" placeholder="Сообщение..."></textarea>
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" style="display:none">

  <!-- Emoji Picker -->
  <script type="module">
    import 'https://cdn.jsdelivr.net/npm/emoji-picker-element@1.20.2/index.js';
  </script>

  <script>
    // ============ FIREBASE ============
    const firebaseConfig = {
      apiKey: "AIzaSyAGqZPNEL2eihYYxr0ZJoE-Tedg1cO5cVo",
      authDomain: "fchat-d6879.firebaseapp.com",
      databaseURL: "https://fchat-d6879-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "fchat-d6879",
      storageBucket: "fchat-d6879.firebasestorage.app",
      messagingSenderId: "1049514912319",
      appId: "1:1049514912319:web:2ec9ca065eca5ac5da668a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ============ FAMILY ============
    const FAMILY = {
      dad: { id: 'dad', name: 'Папа', emoji: '👨' },
      mom: { id: 'mom', name: 'Мама', emoji: '👩' },
      sergey: { id: 'sergey', name: 'Сергей', emoji: '👦' },
      sveta: { id: 'sveta', name: 'Света', emoji: '👧' },
      katya: { id: 'katya', name: 'Катя', emoji: '👧' }
    };

    // ============ STATE ============
    let currentUser = localStorage.getItem('fc_user') || 'dad';
    let activeTab = 'general';
    let privateWith = null;
    let autoDeleteHours = 24;
    let messageListener = null;
    let mediaRecorder = null;
    let audioChunks = [];

    // ============ INDEXEDDB ============
    let dbLocal;
    const request = indexedDB.open('FChatMedia', 1);
    
    request.onupgradeneeded = (e) => {
      dbLocal = e.target.result;
      if (!dbLocal.objectStoreNames.contains('media')) {
        dbLocal.createObjectStore('media', { keyPath: 'id' });
      }
    };
    
    request.onsuccess = (e) => {
      dbLocal = e.target.result;
    };

    function saveMedia(id, data) {
      return new Promise((resolve) => {
        const tx = dbLocal.transaction('media', 'readwrite');
        tx.objectStore('media').put({ id, data, time: Date.now() });
        tx.oncomplete = () => resolve();
      });
    }

    function getMedia(id) {
      return new Promise((resolve) => {
        const tx = dbLocal.transaction('media', 'readonly');
        const req = tx.objectStore('media').get(id);
        req.onsuccess = () => resolve(req.result?.data || null);
      });
    }

    // ============ INIT ============
    function init() {
      renderUsers();
      setupTabs();
      setupListeners();
      loadSettings();
      subscribeToMessages();
      startAutoDelete();
    }

    // ============ USERS ============
    function renderUsers() {
      const row = document.getElementById('usersRow');
      row.innerHTML = Object.values(FAMILY).map(m => `
        <div class="user-btn ${m.id === currentUser ? 'active' : ''}" data-user="${m.id}">
          ${m.emoji} ${m.name}
        </div>
      `).join('');

      row.querySelectorAll('.user-btn').forEach(btn => {
        btn.addEventListener('click', () => switchUser(btn.dataset.user));
      });
    }

    function switchUser(userId) {
      if (userId === currentUser) return;
      
      // Simple PIN
      const savedPin = localStorage.getItem(`fc_pin_${userId}`);
      if (savedPin) {
        const pin = prompt(`Введите ПИН для ${FAMILY[userId].name}:`);
        if (pin !== savedPin) {
          alert('Неверный ПИН');
          return;
        }
      } else {
        const pin = prompt(`Придумайте 4-значный ПИН для ${FAMILY[userId].name}:`);
        if (!pin || pin.length !== 4) return;
        localStorage.setItem(`fc_pin_${userId}`, pin);
      }

      currentUser = userId;
      localStorage.setItem('fc_user', userId);
      renderUsers();
      resetChat();
    }

    // ============ TABS ============
    function setupTabs() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          activeTab = tab.dataset.tab;
          
          const privateSel = document.getElementById('privateSelector');
          if (activeTab === 'private') {
            privateSel.style.display = 'block';
            updatePrivateList();
          } else {
            privateSel.style.display = 'none';
            privateWith = null;
          }
          
          resetChat();
        });
      });
    }

    function updatePrivateList() {
      const select = document.getElementById('privateRecipient');
      const others = Object.values(FAMILY).filter(m => m.id !== currentUser);
      
      select.innerHTML = '<option value="">Выберите...</option>' +
        others.map(m => `<option value="${m.id}" ${m.id === privateWith ? 'selected' : ''}>${m.emoji} ${m.name}</option>`).join('');
      
      if (!privateWith && others.length > 0) {
        privateWith = others[0].id;
        select.value = privateWith;
      }
    }

    document.getElementById('privateRecipient').addEventListener('change', (e) => {
      privateWith = e.target.value;
      if (privateWith) resetChat();
    });

    // ============ MESSAGES ============
    function getChatPath() {
      if (activeTab === 'private' && privateWith) {
        const users = [currentUser, privateWith].sort();
        return `private/${users[0]}_${users[1]}`;
      }
      return 'general';
    }

    function subscribeToMessages() {
      // Unsubscribe previous
      if (messageListener) {
        db.ref(getChatPath()).off('child_added', messageListener);
      }

      const chatRef = db.ref(getChatPath());
      
      // Clear window
      document.getElementById('chatWindow').innerHTML = `
        <div class="empty-chat">
          <div class="empty-icon">💬</div>
          <p>Нет сообщений</p>
        </div>
      `;

      messageListener = chatRef.on('child_added', (snap) => {
        const msg = snap.val();
        msg.id = snap.key;
        displayMessage(msg);
      });

      // Listen for edits
      chatRef.on('child_changed', (snap) => {
        const msg = snap.val();
        msg.id = snap.key;
        updateMessageDisplay(msg);
      });

      // Listen for deletes
      chatRef.on('child_removed', (snap) => {
        const el = document.querySelector(`[data-id="${snap.key}"]`);
        if (el) el.remove();
      });
    }

    function resetChat() {
      subscribeToMessages();
    }

    function displayMessage(msg) {
      const chatWindow = document.getElementById('chatWindow');
      
      // Remove empty state
      const emptyEl = chatWindow.querySelector('.empty-chat');
      if (emptyEl) emptyEl.remove();

      const isSent = msg.from === currentUser;
      const sender = FAMILY[msg.from] || { name: 'Неизвестный', emoji: '👤' };
      
      const div = document.createElement('div');
      div.className = `message ${isSent ? 'sent' : 'received'}`;
      div.dataset.id = msg.id;
      
      let content = '';
      
      if (msg.type === 'image' && msg.mediaId) {
        // Image from IndexedDB
        content = `<div class="media-placeholder" data-media-id="${msg.mediaId}">
          <em>Загрузка изображения...</em>
        </div>`;
        
        // Load image
        getMedia(msg.mediaId).then(data => {
          if (data) {
            const placeholder = div.querySelector('.media-placeholder');
            if (placeholder) {
              placeholder.innerHTML = `<img src="${data}" class="media-img" alt="Фото">`;
            }
          }
        });
      } else if (msg.type === 'voice' && msg.mediaId) {
        content = `<div class="media-placeholder" data-media-id="${msg.mediaId}">
          <em>Загрузка аудио...</em>
        </div>`;
        
        getMedia(msg.mediaId).then(data => {
          if (data) {
            const placeholder = div.querySelector('.media-placeholder');
            if (placeholder) {
              placeholder.innerHTML = `<audio controls class="media-audio" src="${data}"></audio>`;
            }
          }
        });
      } else {
        content = msg.text || '';
      }

      const time = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { 
        hour: '2-digit', minute: '2-digit' 
      });

      div.innerHTML = `
        ${!isSent ? `<div class="msg-sender">${sender.emoji} ${sender.name}</div>` : ''}
        <div class="bubble">
          ${content}
          <div class="msg-time">
            ${time}
            ${isSent ? '<span class="msg-actions">⋮</span>' : ''}
          </div>
        </div>
      `;

      // Context menu
      if (isSent) {
        const actionsBtn = div.querySelector('.msg-actions');
        if (actionsBtn) {
          actionsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            showContextMenu(e, msg);
          });
        }
      }

      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function updateMessageDisplay(msg) {
      const old = document.querySelector(`[data-id="${msg.id}"]`);
      if (old) {
        old.remove();
        displayMessage(msg);
      }
    }

    function showContextMenu(event, msg) {
      const existing = document.querySelector('.context-menu');
      if (existing) existing.remove();

      const menu = document.createElement('div');
      menu.className = 'context-menu';
      menu.innerHTML = `
        <button>✏️ Редактировать</button>
        <button class="danger-btn">🗑️ Удалить</button>
      `;
      
      menu.style.left = Math.min(event.clientX, window.innerWidth - 150) + 'px';
      menu.style.top = event.clientY + 'px';
      
      document.body.appendChild(menu);

      menu.querySelectorAll('button')[0].addEventListener('click', () => {
        menu.remove();
        const newText = prompt('Новый текст:', msg.text || '');
        if (newText && newText !== msg.text) {
          db.ref(`${getChatPath()}/${msg.id}`).update({ text: newText, edited: true });
        }
      });

      menu.querySelectorAll('button')[1].addEventListener('click', () => {
        menu.remove();
        if (confirm('Удалить сообщение?')) {
          db.ref(`${getChatPath()}/${msg.id}`).remove();
          if (msg.mediaId) {
            // Remove from IndexedDB
            const tx = dbLocal.transaction('media', 'readwrite');
            tx.objectStore('media').delete(msg.mediaId);
          }
        }
      });

      // Close on outside click
      setTimeout(() => {
        const handler = () => {
          menu.remove();
          document.removeEventListener('click', handler);
        };
        document.addEventListener('click', handler);
      }, 0);
    }

    // ============ SEND ============
    async function sendMessage(text) {
      if (!text.trim()) return;
      
      const msg = {
        from: currentUser,
        text: text.trim(),
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        type: 'text'
      };
      
      if (autoDeleteHours > 0) {
        msg.deleteAt = Date.now() + (autoDeleteHours * 3600000);
      }
      
      await db.ref(getChatPath()).push(msg);
      document.getElementById('msgInput').value = '';
    }

    async function sendMedia(type, dataUrl) {
      const mediaId = type + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      
      // Save to IndexedDB
      await saveMedia(mediaId, dataUrl);
      
      // Save reference to Firebase
      const msg = {
        from: currentUser,
        type: type,
        mediaId: mediaId,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        text: type === 'image' ? '📷 Фото' : '🎤 Голосовое сообщение'
      };
      
      if (autoDeleteHours > 0) {
        msg.deleteAt = Date.now() + (autoDeleteHours * 3600000);
      }
      
      await db.ref(getChatPath()).push(msg);
    }

    // ============ LISTENERS ============
    function setupListeners() {
      // Send button
      document.getElementById('sendBtn').addEventListener('click', () => {
        sendMessage(document.getElementById('msgInput').value);
      });

      // Enter to send
      document.getElementById('msgInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(e.target.value);
        }
      });

      // Emoji
      document.getElementById('emojiBtn').addEventListener('click', () => {
        const container = document.getElementById('emojiContainer');
        container.classList.toggle('show');
      });

      // Wait for emoji-picker to be defined
      customElements.whenDefined('emoji-picker').then(() => {
        const picker = document.getElementById('emojiPicker');
        if (picker) {
          picker.addEventListener('emoji-click', (e) => {
            document.getElementById('msgInput').value += e.detail.unicode;
            document.getElementById('msgInput').focus();
          });
        }
      });

      // File upload
      document.getElementById('attachBtn').addEventListener('click', () => {
        document.getElementById('fileInput').click();
      });

      document.getElementById('fileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            sendMedia('image', ev.target.result);
          };
          reader.readAsDataURL(file);
        }
      });

      // Voice recording
      document.getElementById('micBtn').addEventListener('click', async () => {
        const micBtn = document.getElementById('micBtn');
        
        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
          micBtn.classList.remove('recording');
          return;
        }

        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = (e) => {
            audioChunks.push(e.data);
          };

          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = (ev) => {
              sendMedia('voice', ev.target.result);
            };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(t => t.stop());
          };

          mediaRecorder.start();
          micBtn.classList.add('recording');

          // Auto-stop after 10 seconds
          setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
              mediaRecorder.stop();
              micBtn.classList.remove('recording');
            }
          }, 10000);
        } catch (err) {
          alert('Микрофон недоступен: ' + err.message);
        }
      });

      // Auto delete setting
      document.getElementById('autoDeleteSelect').addEventListener('change', (e) => {
        autoDeleteHours = parseInt(e.target.value);
        localStorage.setItem('fc_autoDelete', autoDeleteHours);
      });

      // Clear chat
      document.getElementById('clearChatBtn').addEventListener('click', () => {
        if (confirm('Очистить все сообщения в этом чате?')) {
          db.ref(getChatPath()).remove();
        }
      });

      // Theme toggle
      document.getElementById('themeBtn').addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        const isDark = document.body.classList.contains('dark-theme');
        document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('fc_theme', isDark ? 'dark' : 'light');
      });
    }

    function loadSettings() {
      // Auto delete
      autoDeleteHours = parseInt(localStorage.getItem('fc_autoDelete') || '24');
      document.getElementById('autoDeleteSelect').value = autoDeleteHours;

      // Theme
      const theme = localStorage.getItem('fc_theme') || 'light';
      if (theme === 'dark') {
        document.body.classList.add('dark-theme');
        document.getElementById('themeBtn').textContent = '☀️';
      }
    }

    // ============ AUTO DELETE ============
    function startAutoDelete() {
      setInterval(async () => {
        if (autoDeleteHours === 0) return;
        
        const chatRef = db.ref(getChatPath());
        const snap = await chatRef.once('value');
        const msgs = snap.val();
        
        if (!msgs) return;
        
        const now = Date.now();
        const updates = {};
        
        for (const [id, msg] of Object.entries(msgs)) {
          if (msg.deleteAt && msg.deleteAt <= now) {
            updates[id] = null;
          }
        }
        
        if (Object.keys(updates).length > 0) {
          await chatRef.update(updates);
        }
      }, 30000);
    }

    // Start app
    init();
    console.log('✅ FChat запущен');
  </script>
</body>
</html>
