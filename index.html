<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FChat — Семейный мессенджер</title>
  
  <!-- Стили -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Firebase (библиотеки) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

  <!-- Оверлей секретного входа -->
  <div class="secret-overlay" id="secretOverlay">
    <div class="secret-dialog">
      <div class="icon">🏠</div>
      <h2>Вход в FChat</h2>
      <p>Введите семейный код доступа</p>
      <input type="password" class="secret-input" id="secretKeyInput" placeholder="****" maxlength="4">
      <button class="secret-btn" onclick="checkSecretKey()">Войти</button>
      <div class="error-msg" id="errorMsg">Неверный код доступа</div>
    </div>
  </div>

  <!-- Оверлей PIN-кода -->
  <div class="pin-overlay" id="pinOverlay">
    <div class="pin-dialog">
      <div class="user-icon" id="pinUserIcon">👤</div>
      <h2 id="pinUserName">Имя пользователя</h2>
      <p>Введите ваш личный PIN-код</p>
      <input type="password" class="pin-input" id="pinInput" placeholder="****" maxlength="4">
      <button class="pin-btn" onclick="verifyPin()">Подтвердить</button>
      <div class="error-msg" id="pinErrorMsg">Неверный PIN-код</div>
    </div>
  </div>

  <div class="app">
    <header class="header">
      <div class="header-logo">💬</div>
      <div class="header-title">FChat</div>
      <div class="header-actions">
        <button class="header-btn" onclick="toggleTheme()">🌓</button>
        <button class="header-btn" onclick="toggleSettings()">⚙️</button>
      </div>
    </header>

    <div class="users-avatars" id="usersList">
      <!-- Аватары пользователей будут здесь -->
    </div>

    <div class="private-chat-header" id="privateHeader">
      <span>🔒 Приватный чат</span>
    </div>

    <div class="settings-panel" id="settingsPanel">
      <h3>Настройки</h3>
      <!-- Содержимое настроек -->
    </div>
    
    <!-- Сюда вставим блок сообщений и ввода, когда ты пришлешь вторую часть кода -->

  </div>

  <!-- Логика -->
  <script src="script.js"></script>
</body>
</html>
