<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FChat — Семейный чат</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0d1b2a; color: #e0e1dd; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1b4332; padding: 15px; text-align: center; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; background: #1b263b; border-bottom: 1px solid #415a77; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; opacity: 0.6; }
        .tab.active { opacity: 1; border-bottom: 3px solid #40916c; background: #1b4332; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 75%; padding: 10px; border-radius: 12px; font-size: 0.9rem; position: relative; }
        .incoming { background: #415a77; align-self: flex-start; }
        .outgoing { background: #2d6a4f; align-self: flex-end; }
        .user-name { font-size: 0.7rem; font-weight: bold; margin-bottom: 3px; color: #9bc1bc; cursor: pointer; }
        .input-area { background: #1b263b; padding: 10px; display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #0d1b2a; color: white; outline: none; }
        button { background: #40916c; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        #private-status { background: #e63946; font-size: 0.7rem; padding: 4px; text-align: center; display: none; }
    </style>
</head>
<body>
    <header>
        <span>FChat</span>
        <input type="text" id="username" placeholder="Твое имя" style="width: 80px; background: #0d1b2a;">
    </header>

    <div class="tabs">
        <div id="btn-common" class="tab active" onclick="setMode('common')">Общий чат</div>
        <div id="btn-private" class="tab" onclick="setMode('private')">Личный чат</div>
    </div>

    <div id="private-status"></div>

    <div id="chat-window"></div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Начни писать...">
        <button id="send-btn">---></button>
    </div>

    <!-- Звук уведомления -->
    <audio id="notif-sound" src="https://mixkit.co"></audio>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
      import { getDatabase, ref, push, onChildAdded, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

      const firebaseConfig = {
          apiKey: "AIzaSyAGqZPNEL2eihYYxr0ZJoE-Tedg1cO5cVo",
          authDomain: "fchat-d6879.firebaseapp.com",
          databaseURL: "https://fchat-d6879-default-rtdb.europe-west1.firebasedatabase.app",
          projectId: "fchat-d6879",
          storageBucket: "fchat-d6879.firebasestorage.app",
          messagingSenderId: "1049514912319",
          appId: "1:1049514912319:web:2ec9ca065eca5ac5da668a",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let mode = 'common'; // или 'private'
        let chatBuddy = '';
        const userInp = document.getElementById('username');
        const msgInp = document.getElementById('msg-input');
        const chatWin = document.getElementById('chat-window');
        const sound = document.getElementById('notif-sound');

        // Смена режима
        window.setMode = (m) => {
            mode = m;
            document.getElementById('btn-common').className = 'tab' + (m === 'common' ? ' active' : '');
            document.getElementById('btn-private').className = 'tab' + (m === 'private' ? ' active' : '');
            if(m === 'common') {
                chatBuddy = '';
                document.getElementById('private-status').style.display = 'none';
            }
            refreshChat();
        };

        // Клик по имени пользователя
        window.pickUser = (name) => {
            if(name === userInp.value) return;
            chatBuddy = name;
            document.getElementById('private-status').innerText = "Пишем лично для: " + name;
            document.getElementById('private-status').style.display = 'block';
            setMode('private');
        };

        function refreshChat() {
            chatWin.innerHTML = '';
            // Подгружаем заново (в простом варианте) или фильтруем
            // Для скорости в этом коде мы просто будем слушать всё и фильтровать при показе
        }

        // Слушаем ВСЕ сообщения
        const allMsgsRef = ref(db, 'all_messages');
        onChildAdded(allMsgsRef, (snap) => {
            const m = snap.val();
            
            // Логика фильтрации
            let show = false;
            if (mode === 'common' && m.type === 'common') show = true;
            if (mode === 'private' && m.type === 'private') {
                if ((m.from === userInp.value && m.to === chatBuddy) || 
                    (m.from === chatBuddy && m.to === userInp.value)) show = true;
            }

            if (show) {
                const div = document.createElement('div');
                div.className = `message ${m.from === userInp.value ? 'outgoing' : 'incoming'}`;
                div.innerHTML = `<div class="user-name" onclick="pickUser('${m.from}')">${m.from}</div>${m.text}`;
                chatWin.appendChild(div);
                chatWin.scrollTop = chatWin.scrollHeight;
                
                // Звук если сообщение не от нас
                if (m.from !== userInp.value) sound.play().catch(()=>{});
            }
        });

        // Отправка
        document.getElementById('send-btn').onclick = () => {
            const text = msgInp.value.trim();
            const from = userInp.value.trim() || 'Гость';
            if(!text) return;

            const newMsg = {
                from: from,
                text: text,
                time: Date.now(),
                type: mode,
                to: chatBuddy
            };

            push(allMsgsRef, newMsg);
            msgInp.value = '';
        };
    </script>
</body>
</html>
