<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FChat — Семейный чат</title>
    <style>
        /* Существующие стили остаются без изменений */
    </style>
</head>
<body>
    <header>FChat — Семейный чат</header>
    
    <div class="chat-tabs">
        <button id="btn-general" class="active">Общий чат</button>
        <button id="btn-private">Личный чат</button>
    </div>

    <div id="chat-window"></div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="username" placeholder="Ваше имя">
            <select id="recipient-select" style="display: none;">
                <option value="">Выберите получателя или введите новое</option>
            </select>
        </div>
        <div class="input-row">
            <input type="text" id="message-input" placeholder="Напишите сообщение...">
            <button id="send-btn">Отправить</button>
        </div>
    </div>

    <!-- НОВАЯ ЧАСТЬ: Элемент для звукового уведомления -->
    <audio id="notificationSound" src="notification.mp3"></audio> <!-- Убедитесь, что файл существует -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAGqZPNEL2eihYYxr0ZJoE-Tedg1cO5cVo",
            authDomain: "fchat-d6879.firebaseapp.com",
            databaseURL: "https://fchat-d6879-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fchat-d6879",
            storageBucket: "fchat-d6879.firebasestorage.app",
            messagingSenderId: "1049514912319",
            appId: "1:1049514912319:web:2ec9ca065eca5ac5da668a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const chatWindow = document.getElementById('chat-window');
        const usernameInput = document.getElementById('username');
        const recipientSelect = document.getElementById('recipient-select');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const btnGeneral = document.getElementById('btn-general');
        const btnPrivate = document.getElementById('btn-private');

        // НОВАЯ ЧАСТЬ: Для уведомлений
        const notificationSound = document.getElementById('notificationSound');

async function requestNotificationPermission() {
    if ('Notification' in window) {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
            console.log('Уведомления разрешены');
        } else {
            console.log('Уведомления не разрешены');
        }
    }
}

function playNotificationSound() {
    notificationSound.play().catch(error => console.error('Ошибка воспроизведения звука:', error));
}

function showNotification(title, body) {
    if (Notification.permission === 'granted') {
        new Notification(title, { body });
    }
}

let currentChatType = 'general';
let currentRecipient = '';
let currentChatRef = null;
let currentUnsubscribe = null;
let recentRecipients = JSON.parse(localStorage.getItem('recentRecipients') || '[]');

function saveRecentRecipient(name) {
    if (!name) return;
    recentRecipients = recentRecipients.filter(n => n !== name);
    recentRecipients.unshift(name);
    if (recentRecipients.length > 7) recentRecipients.pop();
    localStorage.setItem('recentRecipients', JSON.stringify(recentRecipients));
    updateRecipientSelect();
}

function updateRecipientSelect() {
    recipientSelect.innerHTML = '<option value="">Выберите получателя или введите новое</option>';
    recentRecipients.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        recipientSelect.appendChild(opt);
    });
}

function getChatId(user1, user2) {
    const u1 = (user1 || '').trim().toLowerCase();
    const u2 = (user2 || '').trim().toLowerCase();
    return u1 < u2 ? `{u1}_{u2}` : `{u2}_{u1}`;
}

function formatTime(timestamp) {
    const date = new Date(timestamp);
    const now = new Date();
    const isToday = date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth() && date.getDate() === now.getDate();
    if (isToday) return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    return date.toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}

function scrollToBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

function clearChat() { chatWindow.innerHTML = ''; }

function addWelcomeMessage(isPrivate) {
    const text = isPrivate ? `👋 Личный чат с <strong>${currentRecipient}</strong>` : `👋 Общий чат`;
    chatWindow.innerHTML += `<div class="message welcome">${text}</div>`;
    scrollToBottom();
}

function addMessage(snapshot) {
    const msg = snapshot.val();
    if (!msg?.text) return;

    const myName = usernameInput.value.trim() || 'Гость';
    const isMy = msg.name === myName;
    const key = snapshot.key;

    const html = `
        <div class="message isMy?′outgoing′:′incoming′"data−key="{isMy ? 'outgoing' : 'incoming'}" data-key="isMy?′outgoing′:′incoming′"data−key="{key}">
            <div class="user-name">${msg.name || 'Аноним'}</div>
            <div class="message-text">${msg.text}</div>
            <div class="message-time">${formatTime(msg.time || Date.now())}</div>
            ${isMy ? `<button class="edit-btn" title="Редактировать">✏️</button>` : ''}
        </div>`;
    chatWindow.innerHTML += html;
    scrollToBottom();
// НОВАЯ ЧАСТЬ: Уведомления для сообщений от других пользователей
    if (!isMy) {
        playNotificationSound();
        showNotification('Новое сообщение', `Новое сообщение от msg.name:{msg.name}:msg.name:{msg.text.substring(0, 50)}...`);  // Показываем уведомление с коротким текстом
    }

    // Обработчик редактирования
    if (isMy) {
        const msgDiv = chatWindow.lastElementChild;
        msgDiv.querySelector('.edit-btn').addEventListener('click', () => editMessage(msgDiv, key, msg.text));
    }
}  // Завершение функции addMessage

function editMessage(msgDiv, key, oldText) {
    const textDiv = msgDiv.querySelector('.message-text');
    const editInput = document.createElement('input');
    editInput.type = 'text';
    editInput.value = oldText;
    editInput.style.width = '100%';
    textDiv.replaceWith(editInput);
    editInput.focus();

    const saveBtn = document.createElement('button');
    saveBtn.textContent = 'Сохранить';
    saveBtn.style.marginTop = '6px';
    msgDiv.appendChild(saveBtn);

    saveBtn.addEventListener('click', () => {
        const newText = editInput.value.trim();
        if (newText && newText !== oldText) {
            const chatPath = currentChatType === 'general' ? 'messages' : `privateChats/${getChatId(usernameInput.value, currentRecipient)}/messages`;
            update(ref(db, `chatPath/{chatPath}/chatPath/{key}`), { text: newText });
        }
        loadChat();  // перезагрузка чата для простоты
    });
}

function loadChat() {
    clearChat();
    if (currentUnsubscribe) currentUnsubscribe();

    let path = currentChatType === 'general' ? 'messages' : null;

    if (currentChatType === 'private') {
        const selected = recipientSelect.value || currentRecipient;
        if (!usernameInput.value.trim() || !selected) {
            alert("Введите своё имя и выберите/введите получателя");
            return;
        }
        currentRecipient = selected;
        saveRecentRecipient(currentRecipient);
        const chatId = getChatId(usernameInput.value, currentRecipient);
        path = `privateChats/${chatId}/messages`;
    }

    currentChatRef = ref(db, path);
    addWelcomeMessage(currentChatType === 'private');
    currentUnsubscribe = onChildAdded(currentChatRef, addMessage);
}

function sendMessage() {
    const name = usernameInput.value.trim() || 'Гость';
    const text = messageInput.value.trim();
    if (!text) return;

    let targetPath = currentChatType === 'general' ? 'messages' : null;
    if (currentChatType === 'private') {
        const rec = recipientSelect.value || currentRecipient;
        if (!rec) return alert("Выберите получателя");
        currentRecipient = rec;
        saveRecentRecipient(rec);
        const chatId = getChatId(name, rec);
        targetPath = `privateChats/${chatId}/messages`;
    }

    push(ref(db, targetPath), { name, text, time: Date.now() });
    messageInput.value = '';
}

        // Переключение чатов
        btnGeneral.addEventListener('click', () => {
        currentChatType = 'general';
        btnGeneral.classList.add('active');
        btnPrivate.classList.remove('active');
        recipientSelect.style.display = 'none';
        loadChat();
        });

        btnPrivate.addEventListener('click', () => {
        currentChatType = 'private';
        btnGeneral.classList.remove('active');
        btnPrivate.classList.add('active');
        recipientSelect.style.display = 'block';
        updateRecipientSelect();
        loadChat();
        });

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
        // Запрос разрешения на уведомления при загрузке страницы
        window.addEventListener('load', () => {
        requestNotificationPermission();  // НОВАЯ ЧАСТЬ: Запрашиваем разрешение на уведомления
        updateRecipientSelect();
        usernameInput.focus();
        loadChat();
        console.log("✅ FChat обновлён: с уведомлениями и запоминанием имён");
       });
    </script>
</body>
</html>
